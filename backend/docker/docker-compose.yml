services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: snail-postgres
    environment:
      POSTGRES_USER: snail
      POSTGRES_PASSWORD: snail
      POSTGRES_DB: snail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snail -d snail"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: snail-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: snail-api
    environment:
      ENV: local
      JWT_SECRET: dev-only-change-me-32-chars-minimum
      DATABASE_URL: postgresql+asyncpg://snail:snail@postgres:5432/snail
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:8000 --timeout 60"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: snail-worker
    environment:
      ENV: local
      JWT_SECRET: dev-only-change-me-32-chars-minimum
      DATABASE_URL: postgresql+asyncpg://snail:snail@postgres:5432/snail
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["arq", "app.workers.main.WorkerSettings"]

volumes:
  postgres-data:
  redis-data:
