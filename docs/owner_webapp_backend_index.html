"}, {"id": "1-1", "level": 2, "title": "1-1. 회원가입", "line": 21, "body": "- 입력 항목: 이메일, 비밀번호, 대표자명, 연락처\n\n- **비밀번호 정책**: 8자 이상 + 영문/숫자 조합 1개 이상 (특수문자 강제 안 함)\n\n- 가입 완료 후 사업자 인증 제출 화면으로 자동 이동\n\n- **비밀번호 찾기/재설정**: 로그인 화면 [비밀번호 재설정] 링크 → 이메일 입력 → 백엔드가 토큰 이메일 발송(15분 TTL) → 링크 클릭하면 신규 비번 설정 화면. 미가입 이메일이어도 동일 화면 노출 (사용자 enumeration 방지)", "excerpt": "- 입력 항목: 이메일, 비밀번호, 대표자명, 연락처\n- **비밀번호 정책**: 8자 이상 + 영문/숫자 조합 1개 이상 (특수문자 강제 안 함)\n- 가입 완료 후 사업자 인증 제출 화면으로 자동 이동\n- **비밀번호 찾기/재설정**: 로그인 화면 [비밀번호 재설정] 링크 → 이메일 입력 → 백엔드가 토큰 이메일 발송(15분 TTL) → 링크 클릭하면 신규 비번 설정 화면. 미가입 이메일이어도 동일 화면 노출 (사용자 enumeration 방지)"}, {"id": "1-2", "level": 2, "title": "1-2. 사업자 인증", "line": 31, "body": "- 입력 항목: 사업자등록번호, 사업자등록증 이미지 또는 PDF 업로드\n\n- 제출 후 상태: pending → 어드민 수동 검토\n\n- 승인 완료: approved → 샵/디자인 공개 및 예약 운영 기능 활성화\n\n- 반려: rejected → 반려 사유 화면에 표시, 재제출 가능\n\n- 인증 대기 중에도 웹앱 탐색(읽기)과 샵/디자이너/디자인 초안 작성 가능\n\n- 인증 대기 중 공개 전환, 유저 예약 접수, 예약 수락·거절·취소·완료·노쇼 등 운영 기능은 비활성화\n\n- **백엔드 게이트**: 사장님 웹 UI에서 버튼을 숨기는 것뿐 아니라, 백엔드도 verification_status != approved인 경우 공개/예약 운영성 API에 대해 HTTP 403 + `VERIFICATION_REQUIRED` 코드를 반환 (UI 우회 방지). 게이트 적용 대상은 공개 전환 및 예약 수락·거절·취소·완료·노쇼·입금확인 API\n  - 허용되는 API (인증 전이라도 호출 가능): 로그인/로그아웃, 자기 정보 조회·수정, 사업자 인증 제출, 알림함 조회, 공개 검색/탐색, 샵/디자이너/디자인 초안 작성\n  - 프론트는 `FORBIDDEN`(소유권 위반)과 `VERIFICATION_REQUIRED`(인증 미완료)를 구분해 다른 안내 화면으로 유도\n\n- **반려(rejected) 상태**: 반려 사유 화면에 표시 + 같은 사업자 인증 제출 API로 재제출 가능 (재제출 시 자동으로 pending 상태로 되돌아감)", "excerpt": "- 입력 항목: 사업자등록번호, 사업자등록증 이미지 또는 PDF 업로드\n- 제출 후 상태: pending → 어드민 수동 검토\n- 승인 완료: approved → 샵/디자인 공개 및 예약 운영 기능 활성화\n- 반려: rejected → 반려 사유 화면에 표시, 재제출 가능\n- 인증 대기 중에도 웹앱 탐색(읽기)과 샵/디자이너/디자인 초안 작성 가능\n- 인증 대기 중 공개 전환, 유저 예약 접수, 예약 수락·거절·취소·완료·노쇼 등 운영 기능은 비활성화\n- **백엔드 게이트**: 사장님 웹 UI에서 버튼을 숨기는 것뿐 아니라, 백엔드도 verification_status != approved인 경우 공개/예약 운영성 API에 대해 HTTP 403 + `VERIFICATION_REQUIRED` 코드를 반환 (UI 우회 방지). 게이트 적용 대상은 공개 전환 및 예약 수락·거절·취소·완료·노쇼·입금확인 API\n  - 허용되는 API (인증 전이라도 호출 가능): 로그인/로그아웃, 자기 정보 조회·수정, 사업자 인증 제출, 알림함 조회, 공개 검색/탐색, 샵/디자이너/디자인 초 /main/spec_text/05_owner_shop.md#L47"}, {"name": "business_license_image", "type": "image/pdf", "required": "필수", "note": "운영자 수동 승인", "source_file": "spec_text/05_owner_shop.md", "line": 53, "entity": "Owner", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L53"}, {"name": "verification_status", "type": "enum", "required": "자동", "note": "pending/approved/rejected", "source_file": "spec_text/05_owner_shop.md", "line": 59, "entity": "Owner", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L59"}], "api_refs": [{"endpoint": "POST /owner/auth/register", "purpose": "사장님 회원가입", "params": "email, password, owner_name, phone", "source_file": "spec_text/05_owner_shop.md", "line": 265, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L265"}, {"endpoint": "POST /owner/auth/login", "purpose": "사장님 로그인", "params": "email, password", "source_file": "spec_text/05_owner_shop.md", "line": 270, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L270"}, {"endpoint": "POST /owner/auth/logout", "purpose": "로그아웃", "params": "-", "source_file": "spec_text/05_owner_shop.md", "line": 275, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L275"}, {"endpoint": "GET /owner/me", "purpose": "내 계정/사업자 인증 상태 조회", "params": "-", "source_file": "spec_text/05_owner_shop.md", "line": 280, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L280"}, {"endpoint": "PATCH /owner/me", "purpose": "계정 정보 수정", "params": "owner_name, phone", "source_file": "spec_text/05_owner_shop.md", "line": 285, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L285"}, {"endpoint": "POST /owner/business-verification", "purpose": "사업자 정보/사업자등록증 제출. verification_status=rejected 상태에서 재제출 시 자동으로 pending으로 되돌아감", "params": "business_number, business_license_image", "source_file": "spec_text/05_owner_shop.md", "line": 290, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L290"}, {"endpoint": "POST /owner/auth/password-reset/request", "purpose": "비밀번호 재설정 요청 1단계 — 이메일에 토큰 발송 (15분 TTL, 1회 사용). 미가입 이메일이어도 동일 응답 (사용자 enumeration 방지)", "params": "email", "source_file": "spec_text/05_owner_shop.md", "line": 295, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L295"}, {"endpoint": "POST /owner/auth/password-reset/confirm", "purpose": "비밀번호 재설정 2단계 — 토큰 + 신규 비밀번호 제출. 토큰 유효성/만료/사용여부 검증 후 비번 갱신, 토큰 1회용 소진", "params": "token, new_password", "source_file": "spec_text/05_owner_shop.md", "line": 300, "group": "owner_auth", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L300"}], "missing_front_sections": [], "missing_refs": [], "coverage": 1.0, "status": "connected"}, {"id": "2", "title": "샵 설정", "front_sections": ["2", "2-1", "2-2", "2-3", "2-4"], "summary": "샵 기본 정보, 영업시간, 예약 운영 정책, 현장결제/계좌이체 설정.", "backend_files": ["spec_text/05_owner_shop.md", "spec_text/16_common_api_auth.md"], "entities": {"Shop": ["name", "address", "address_detail", "region", "lat", "lng", "phone", "description", "thumbnail_url", "image_urls", "visibility", "business_hours", "auto_accept", "reservation_policy", "payment_method", "deposit_amount", "bank_name", "bank_account_number", "bank_account_holder", "rating_avg", "rating_count", "favorite_count"]}, "apis": {"owner_shop": ["POST /owner/shop", "GET /owner/shop", "PATCH /owner/shop", "PATCH /owner/shop/business-hours", "PATCH /owner/shop/reservation-policy", "PATCH /owner/shop/payment-method", "PATCH /owner/shop/images", "PATCH /owner/shop/visibility"]}, "keywords": ["shop", "business-hours", "payment-method", "deposit"], "checkpoints": ["MVP는 1사장님=1샵 단수 구조이며 사장님 웹 API는 /owner/shop 기준으로 사용.", "auto_accept=true이면 bank_transfer_guide 조합은 백엔드도 VALIDATION_ERROR로 거부."], "implementation_guides": ["샵 리소스 단수 취급: 우리 서비스는 사장님 1명당 샵 1개(MVP 기준)만 가집니다. 따라서 프론트 라우팅이나 전역 상태에서 `shop_id`를 복잡하게 들고 다닐 필요 없이 무조건 `/owner/shop` 단수 API를 호출하시면 됩니다.", "초안 저장과 공개 전환: 사업자 승인이 나기 전(pending)이라도 샵 정보를 미리 작성하고 임시 저장(draft)할 수는 있어야 합니다. 단, 고객에게 샵을 노출하는 `visibility=active` 버튼이나 예약 운영 시작 버튼은 반드시 승인(approved) 후에만 켤 수 있게 비활성화(disabled) 해주세요.", "설정 충돌 방지 UI: [자동 예약 수락(auto_accept=true)]을 켰을 때, 결제 수단 중 [계좌이체 안내(bank_transfer_guide)] 옵션이 아예 클릭되지 않도록 회색으로 막아주세요. 백엔드에서도 거부하겠지만 프론트에서 먼저 막아주는 유저 경험이 핵심입니다."], "playbook": {"api_sequence": ["[초기 진입]: 샵 설정 화면에 들어오면 `POST /owner/shop`을 호출하여 샵 정보를 가져옵니다.", "[초안 폼 렌더링]: 아직 샵 데이터가 404로 없으면 빈 입력 폼을 띄워주고, 폼 작성 후 저장할 때 `POST /owner/shop`으로 생성합니다.", "[부분 수정 분리]: 샵 데이터가 이미 있다면, [기본 정보]는 `POST /owner/shop`, [영업시간]은 `PATCH /owner/shop/business-hours` 로 각각 나누어 저장 버튼과 API를 분리해주세요.", "[정책 및 결제]: 마찬가지로 [예약 정책] 탭은 `PATCH /owner/shop/reservation-policy`, [결제 방식] 탭은 `PATCH /owner/shop/payment-method`로 저장 로직을 분리해 관리합니다.", "[이미지 관리]: 대표 이미지(thumbnail_url)와 샵 갤러리 이미지(image_urls, 최대 10장)를 수정할 때는 `PATCH /owner/shop/images`를 호출합니다. 이미지 파일 자체는 먼저 `POST /uploads/presigned`로 업로드 URL을 받아 직접 올린 후, 반환된 URL을 이 API에 넘깁니다.", "[공개 상태 토글]: 스위치를 눌러 공개/숨김을 바꿀 때는 `PATCH /owner/shop/visibility`를 호출합니다. 단, 아직 사업자 승인 전이라면 이 스위치를 회색으로 막아둬야 합니다."], "ui_events": [["[버튼] 샵 기본 정보 저장", "PATCH /owner/shop", "화면 하단에 '저장 완료' 토스트를 띄워주고, 입력된 값으로 화면 상태(Context/Store)를 즉시 갱신합니다.", "주소 누락, 전화번호 포맷 등의 에러는 팝업 대신 각 입력칸 하단에 빨간 안내 문구로 콕 집어 표시해주세요."], ["[버튼] 영업시간 저장", "PATCH /owner/shop/business-hours", "저장 성공 시 '영업시간이 변경되어 향후 예약 가능 시간이 재계산됩니다'라는 안내 툴팁을 잠깐 띄워주면 좋습니다.", "시간대가 겹치는 등 논리 오류가 발생하면 캘린더/시간 선택기 쪽에 경고를 표시합니다."], ["[버튼] 결제 방식 저장", "PATCH /owner/shop/payment-method", "결제 수단 안내 텍스트나 미리보기 화면을 방금 저장한 내용으로 즉각 업데이트해서 보여줍니다.", "계좌이체를 골랐는데 예금주나 계좌번호 입력칸이 비어있으면 저장 버튼 자체를 막거나 누를 때 입력칸을 붉게 깜빡여주세요."], ["[토글] 샵 공개 상태", "PATCH /owner/shop/visibility", "성공 시 헤더의 샵 뱃지를 active(초록색) / hidden(회색)으로 즉시 갈아끼워 줍니다.", "승인이 안 끝났는데(`VERIFICATION_REQUIRED`) 누르려 하면 스위치를 원복시키고 '인증 승인이 필요합니다' 모달을 띄워주세요."]], "states": ["`no_shop` (서버 응답 404): 아직 샵 데이터를 한 번도 안 만든 상태. GET /owner/shop 호출 시 404가 돌아오면 빈 초안 생성 폼을 띄워주세요.", "`draft` (서버 값 visibility=draft): 사업자 승인 대기 중(pending)이라도 텍스트 입력과 임시 저장은 가능합니다. 단, 공개 전환 토글은 Disabled 처리해주세요.", "`active` (서버 값 visibility=active): 고객 앱에 노출되고 검색과 예약 진입이 가능한 진짜 샵 운영 상태입니다.", "`hidden` (서버 값 visibility=hidden): 사장님이 원해서 임시로 숨긴 상태. 사장님 본인은 수정이 가능하지만 고객에겐 보이지 않습니다."], "qa": ["사업자 승인 전(pending) 계정으로 로그인한 상태에서 샵 정보를 이것저것 적고 저장을 누르면 성공해야 하고, 샵 공개 토글을 누르면 명확히 막히는지 직접 테스트해주세요.", "[예약 정책] 탭에서 `자동 수락` 토글을 켠 상태일 때, [결제 방식] 탭으로 이동하면 `계좌이체 안내` 선택 박스가 회색으로 잠겨서 아예 클릭을 못 하게 막혀있는지 확인해주세요.", "계좌이체 옵션을 선택했을 때, 나타나는 4가지 하위 입력칸(예약금액, 은행명, 계좌번호, 예금주)을 다 채우기 전까지는 [저장] 버튼이 활성화되지 않는지 프론트 validation을 확인해주세요."]}, "front_refs": [{"id": "2", "level": 1, "title": "2. 샵 설정", "line": 65, "body": "", "excerpt": ""}, {"id": "2-1", "level": 2, "title": "2-1. 샵 기본 정보 등록", "line": 67, "body": "- 1사장님 = 1샵 구조\n\n- 입력 항목: 샵 이름, 주소, 상세주소, 전화번호, 샵 소개\n\n- 주소 입력: 도로명 주소 API 연동 (MVP 포함)\n\n- 대표 이미지 + 샵 이미지 복수 업로드 가능", "excerpt": "- 1사장님 = 1샵 구조\n- 입력 항목: 샵 이름, 주소, 상세주소, 전화번호, 샵 소개\n- 주소 입력: 도로명 주소 API 연동 (MVP 포함)\n- 대표 이미지 + 샵 이미지 복수 업로드 가능"}, {"id": "2-2", "level": 2, "title": "2-2. 영업시간 설정", "line": 77, "body": "- 요일별 오픈/마감 시간 설정\n\n- 요일별 정기 휴무 설정 가능 (예: 매주 일요일 휴무)\n\n- 특정 날짜 임시휴무는 디자이너 스케줄에서 개별 관리 (샵 단위 임시휴무 MVP 제외)", "excerpt": "- 요일별 오픈/마감 시간 설정\n- 요일별 정기 휴무 설정 가능 (예: 매주 일요일 휴무)\n- 특정 날짜 임시휴무는 디자이너 스케줄에서 개별 관리 (샵 단위 임시휴무 MVP 제외)"}, {"id": "2-3", "level": 2, "title": "2-3. 예약 운영 설정", "line": 85, "body": "- 예약 수락 방식 선택: 자동수락 / 수동수락\n\n- 자동수락 기본값: false(수동수락)\n\n- 예약 운영 안내 문구 직접 입력 (취소 / 노쇼 / 변경 안내)\n\n- 예약금 결제 안내 방식 선택: 현장결제 / 계좌이체\n\n- **현장결제**: 예약금 없음. 시술 당일 전액 결제 (앱 내 입금 안내/[입금 완료] 버튼 미노출)\n\n- **계좌이체**: 샵 단위 고정 예약금 운용. 다음 4개 항목 입력 필수\n  - 예약금 금액(원) — 모든 디자인에 동일 적용되는 정액\n  - 은행명\n  - 계좌번호\n  - 예금주\n\n- **조합 제약 (자동수락 ⟹ 현장결제 강제)**:\n  - 자동수락 토글이 ON이면 결제 방식 선택지에서 **계좌이체 비활성화** (자동수락은 사장님이 매번 관여하지 않는 모드라 입금 모니터링이 어렵기 때문)\n  - 자동수락 + 현장결제 / 수동수락 + 현장결제 / 수동수락 + 계좌이체 3개 조합만 허용\n  - 사장님이 계좌이체로 운영 중인 샵을 자동수락으로 바꾸려 하면 안내 모달: \"자동수락으로 전환하려면 현장결제로 먼저 변경하세요\"\n  - 백엔드도 VALIDATION_ERROR로 거부 (UI 우회 방지)\n\n- ⚠️ 미정: 예약금 권장 범위/상한, 0원 입력 허용 여부", "excerpt": "- 예약 수락 방식 선택: 자동수락 / 수동수락\n- 자동수락 기본값: false(수동수락)\n- 예약 운영 안내 문구 직접 입력 (취소 / 노쇼 / 변경 안내)\n- 예약금 결제 안내 방식 선택: 현장결제 / 계좌이체\n- **현장결제**: 예약금 없음. 시술 당일 전액 결제 (앱 내 입금 안내/[입금 완료] 버튼 미노출)\n- **계좌이체**: 샵 단위 고정 예약금 운용. 다음 4개 항목 입력 필수\n  - 예약금 금액(원) — 모든 디자인에 동일 적용되는 정액\n  - 은행명\n  - 계좌번호\n  - 예금주\n- **조합 제약 (자동수락 ⟹ 현장결제 강제)**:\n  - 자동수락 토글이 ON이면 결제 방식 선택지에서 **계좌이체 비활성화** (자동수락은 사장님이 매번 관여하지 않는 모드라 입금 모니터링이 어렵기 때문)\n  - 자동수락 + 현장결제 / 수동수락 + 현장결제 / 수동수락 + 계좌이체 3개 조합만 허용\n  - 사장님이 계좌이체로 운영 중인 샵을 자동수락으로 바꾸려 하면 안내 모달: \"자동수락으로 전환하려면 현장결제로 먼저 변경하세요\"\n  - 백엔드도 VALIDATION_ERROR로 거부 (UI 우회 방지)\n- ⚠️ 미정: 예약금 권장 범위/상한, 0원 입력 허용 여부"}, {"id": "2-4", "level": 2, "title": "2-4. 샵 정보 수정", "line": 111, "body": "- 기본 정보, 영업시간, 예약 운영 설정 각각 수정 가능\n\n- 대표 이미지 / 샵 이미지 교체 가능", "excerpt": "- 기본 정보, 영업시간, 예약 운영 설정 각각 수정 가능\n- 대표 이미지 / 샵 이미지 교체 가능"}], "field_refs": [{"name": "name", "type": "string", "required": "필수", "note": "샵 이름", "source_file": "spec_text/05_owner_shop.md", "line": 79, "entity": "Shop", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L79"}, {"name": "address", "type": "string", "required": "필수", "note": "도로명 주소 API 검토", "source_file": "spec_text/05_owner_shop.md", "line": 85, "entity": "Shop", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L85"}, {"name": "address_detail", "type": "string", "required": "선택", "note": "상세주소", "source_file": "spec_text/05_owner_shop.md", "line": 91, "entity": "Shop", "href": "https://github.com/poi82999/snail_b _guide로 전환 시 deposit_amount + 계좌 3필드 모두 필수, 또한 현재 shop의 auto_accept=true면 거부(VALIDATION_ERROR — 자동수락 ⟹ 현장결제 강제)", "params": "payment_method, deposit_amount?, bank_name?, bank_account_number?, bank_account_holder?", "source_file": "spec_text/05_owner_shop.md", "line": 332, "group": "owner_shop", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L332"}, {"endpoint": "PATCH /owner/shop/images", "purpose": "대표 이미지/샵 이미지 수정", "params": "thumbnail_url, image_urls", "source_file": "spec_text/05_owner_shop.md", "line": 337, "group": "owner_shop", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L337"}, {"endpoint": "PATCH /owner/shop/visibility", "purpose": "샵 공개/숨김 전환. active 전환은 verification_status=approved일 때만 허용. 공개 상태에서만 유저 검색/상세/예약 진입 가능", "params": "visibility", "source_file": "spec_text/05_owner_shop.md", "line": 342, "group": "owner_shop", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L342"}], "missing_front_sections": [], "missing_refs": [], "coverage": 1.0, "status": "connected"}, {"id": "3", "title": "디자이너 관리", "front_sections": ["3", "3-1", "3-2", "3-3", "3-4"], "summary": "디자이너 추가/수정, 전문 태그, 주간 근무시간, 임시 불가 시간, 비활성화.", "backend_files": ["spec_text/05_owner_shop.md"], "entities": {"Designer": ["designer_id", "shop_id", "name", "career_years", "rank", "profile_image_url", "specialty_tags", "is_active"]}, "apis": {"owner_designer": ["POST /owner/designers", "GET /owner/designers", "GET /owner/designers/{designer_id}", "PATCH /owner/designers/{designer_id}", "PATCH /owner/designers/{designer_id}/schedule", "POST /owner/designers/{designer_id}/time-off", "DELETE /owner/designers/{designer_id}"]}, "keywords": ["designer", "schedule", "time-off"], "checkpoints": ["specialty_tags는 현재 자유 입력 string[]이며 검색 대상이 아니라 디스플레이 메타데이터.", "비활성 디자이너의 기존 confirmed 예약 처리 방식은 화면에서 별도 안내가 필요."], "implementation_guides": ["디자이너 목록 관리: 디자이너는 내 단수 샵에 속한 하위 리소스입니다. 디자이너 목록을 불러오거나 추가/수정할 때는 `/owner/designers` 계열 API만 깔끔하게 사용하시면 됩니다.", "전문 태그(specialty_tags) 생략: 현재 이 필드는 단순 텍스트 배열이라 MVP에서는 프론트 입력 UI를 과감히 생략해도 됩니다. 이름, 직급, 경력, 프로필 사진, 활성 상태 등 필수 정보 입력 화면 구성에 먼저 집중해주세요.", "비활성 디자이너 표시: 디자이너를 비활성화하면 신규 예약 캘린더의 선택지에서는 사라지지만, 이미 그 디자이너에게 예약된 과거 내역은 남습니다. 따라서 예약 상세 화면에서는 '이 디자이너가 현재 비활성 상태'라는 것을 작은 배지로라도 알려줘야 합니다."], "playbook": {"api_sequence": ["[목록 진입]: 디자이너 관리 화면에 진입하면 `POST /owner/designers` API로 소속 디자이너 목록을 쭉 가져와 리스트업합니다.", "[추가 및 상세]: 새 디자이너를 만들 때는 `POST /owner/designers`, 특정 디자이너 카드를 눌러 상세 화면에 들어갈 때는 `POST /owner/designers`를 호출합니다.", "[기본 정보 수정]: 이름, 프로필 이미지 등은 상세 화면 안에서 `POST /owner/designers`로 즉시 저장합니다.", "[스케줄 관리]: 고정된 주간 근무시간을 바꿀 때는 `PATCH /owner/designers/{designer_id}/schedule`, 연차 등 임시 휴무일을 찍어줄 때는 `POST /owner/designers/{designer_id}/time-off`를 호출합니다.", "[비활성화/삭제]: 퇴사하거나 당분간 쉬는 디자이너는 `POST /owner/designers`로 처리하고 프론트 목록을 갱신합니다."], "ui_events": [["[버튼] 새 디자이너 추가", "POST /owner/designers", "저장 후 목록 화면으로 돌아오면 방금 추가된 디자이너 카드가 목록 상단에 새롭게 보이도록 추가해줍니다.", "이름이나 직급 등 필수값이 비어있으면 폼 에러(인라인 붉은 글씨)를 표시합니다."], ["[버튼] 근무시간 변경", "PATCH /owner/designers/{designer_id}/schedule", "저장 후 '예약 가능한 슬롯이 새 근무시간에 맞춰 조정되었습니다' 류의 성공 토스트를 띄웁니다.", "시작 시간이 종료 시간보다 늦게 설정되는 등 범위 오류 시 UI 단에서 빨간색 테두리로 피드백을 줍니다."], ["[버튼] 임시 휴무(Time-off) 등록", "POST /owner/designers/{designer_id}/time-off", "성공하면 사장님 스케줄러 캘린더에 해당 날짜 전체를 회색(휴무) 블록으로 덮어 칠해줍니다.", "해당 날짜에 이미 확정된 예약이 존재해서 백엔드가 충돌(CONFLICT)을 뱉으면, '이미 예약된 고객이 있습니다. 예약을 먼저 취소해주세요' 모달을 띄웁니다."], ["[버튼] 디자이너 비활성화", "DELETE /owner/designers/{designer_id}", "해당 디자이너를 신규 예약 배정 후보자 리스트에서 즉시 제거(필터링)합니다.", "기존에 이미 이 디자이너에게 예약된 건들이 있다면, 예약 상세 뷰에서 이름 옆에 '(비활성)' 딱지를 붙여 사장님이 헷갈리지 않게 합니다."]], "states": ["`active`: 정상적으로 일하고 있는 디자이너. 유저 앱에서 예약을 잡을 때 담당자 후보로 노출됩니다.", "`inactive`: 퇴사나 장기 휴가로 비활성화된 디자이너. 과거 예약 기록엔 남아있지만, 앞으로의 신규 예약 후보에서는 쏙 빠져야 합니다.", "`empty`: 아직 등록된 디자이너가 한 명도 없는 상태. 빈 깡통 화면 대신 귀여운 일러스트와 함께 [첫 디자이너를 등록해보세요!] 같은 유도 버튼을 정중앙에 띄워주세요."], "qa": ["디자이너가 0명인 초기 상태일 때, 화면이 텅 비어있지 않고 빈 상태(Empty State) 디자인과 추가 버튼이 예쁘게 나오는지 확인해주세요.", "방금 비활성화 처리한 디자이너가 예약 등록 시 담당자 선택 드롭다운 목록에서 감쪽같이 사라졌는지 프론트에서 꼼꼼히 확인해주세요.", "디자이너의 임시 휴무를 등록한 날짜를 클릭했을 때, '신규 예약 추가' 버튼이 프론트에서 제대로 잠겨있는지 확인해주세요."]}, "front_refs": [{"id": "3", "level": 1, "title": "3. 디자이너 관리", "line": 117, "body": "", "excerpt": ""}, {"id": "3-1", "level": 2, "title": "3-1. 디자이너 추가", "line": 119, "body": "- 입력 항목: 이름, 직급(원장 / 실장 / 주니어 등), 경력(년수), 프로필 사진, 전문 태그\n\n- 전문 태그는 MVP 프론트 입력 UI에서 제외 가능. 백엔드에는 선택 필드로만 유지\n\n- 소개글 없음", "excerpt": "- 입력 항목: 이름, 직급(원장 / 실장 / 주니어 등), 경력(년수), 프로필 사진, 전문 태그\n- 전문 태그는 MVP 프론트 입력 UI에서 제외 가능. 백엔드에는 선택 필드로만 유지\n- 소개글 없음"}, {"id": "3-2", "level": 2, "title": "3-2. 디자이너 정보 수정", "line": 127, "body": "- 이름, 직급, 경력, 프로필 사진, 전문 태그 수정 가능\n\n- 활성 / 비활성 상태 변경 가능", "excerpt": "- 이름, 직급, 경력, 프로필 사진, 전문 태그 수정 가능\n- 활성 / 비활성 상태 변경 가능"}, {"id": "3-3", "level": 2, "title": "3-3. 주간 근무시간 설정", "line": 133, "body": "- 디자이너별 요일별 근무 시작 / 종료 시간 설정\n\n- 특정 날짜 휴무 또는 임시 불가 시간 등록 (날짜 + 시간대 + 사유)", "excerpt": "- 디자이너별 요일별 근무 시작 / 종료 시간 설정\n- 특정 날짜 휴무 또는 임시 불가 시간 등록 (날짜 + 시간대 + 사유)"}, {"id": "3-4", "level": 2, "title": "3-4. 디자이너 비활성화 (퇴사)", "line": 139, "body": "- 비활성화 처리 시 신규 예약 배정 후보에서 제외\n\n- 기존 confirmed 예약은 유지됨\n\n- 사장님이 해당 예약을 수동으로 취소 또는 처리\n\n- 비활성화된 디자이너는 목록에서 구분 표시 (예: '비활성' 뱃지)", "excerpt": "- 비활성화 처리 시 신규 예약 배정 후보에서 제외\n- 기존 confirmed 예약은 유지됨\n- 사장님이 해당 예약을 수동으로 취소 또는 처리\n- 비활성화된 디자이너는 목록에서 구분 표시 (예: '비활성' 뱃지)"}], "field_refs": [{"name": "designer_id", "type": "UUID", "required": "자동", "note": "백엔드 생성", "source_file": "spec_text/05_owner_shop.md", "line": 213, "entity": "Designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L213"}, {"name": "shop_id", "type": "UUID", "required": "자동", "note": "소속 샵", "source_file": "spec_text/05_owner_shop.md", "line": 67, "entity": "Designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L67"}, {"name": "name", "type": "string", "required": "필수" .md#L349"}, {"endpoint": "GET /owner/designers", "purpose": "내 단수 샵 디자이너 목록", "params": "-", "source_file": "spec_text/05_owner_shop.md", "line": 354, "group": "owner_designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L354"}, {"endpoint": "GET /owner/designers/{designer_id}", "purpose": "디자이너 상세", "params": "-", "source_file": "spec_text/05_owner_shop.md", "line": 359, "group": "owner_designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L359"}, {"endpoint": "PATCH /owner/designers/{designer_id}", "purpose": "디자이너 정보 수정", "params": "name, rank, profile_image_url, is_active", "source_file": "spec_text/05_owner_shop.md", "line": 364, "group": "owner_designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L364"}, {"endpoint": "PATCH /owner/designers/{designer_id}/schedule", "purpose": "주간 근무시간 수정", "params": "weekly_schedule", "source_file": "spec_text/05_owner_shop.md", "line": 369, "group": "owner_designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L369"}, {"endpoint": "POST /owner/designers/{designer_id}/time-off", "purpose": "특정일 휴무/임시 불가 시간 등록", "params": "date, start_time, end_time, reason", "source_file": "spec_text/05_owner_shop.md", "line": 374, "group": "owner_designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L374"}, {"endpoint": "DELETE /owner/designers/{designer_id}", "purpose": "퇴사/비활성화 처리", "params": "-", "source_file": "spec_text/05_owner_shop.md", "line": 379, "group": "owner_designer", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/05_owner_shop.md#L379"}], "missing_front_sections": [], "missing_refs": [], "coverage": 1.0, "status": "connected"}, {"id": "4", "title": "디자인 등록 및 관리", "front_sections": ["4", "4-1", "4-2", "4-3", "4-4", "4-5"], "summary": "디자인 등록, 이미지 업로드, owner_tags, LLM 분석 상태, 재분석, 노출/숨김/삭제.", "backend_files": ["spec_text/06_owner_design.md", "spec_text/12_llm.md", "spec_text/16_common_api_auth.md"], "entities": {"Design": ["title", "description", "base_price", "duration_minutes", "available_designer_ids", "owner_tags", "ai_tags", "ai_color_palette", "ai_style_category", "visibility", "ai_analysis_status", "ai_analysis_started_at", "ai_analysis_completed_at", "favorite_count", "view_count"], "DesignImage": ["image_id", "original_url", "cropped_url", "sort_order", "ai_transform_status", "ai_classify_status"]}, "apis": {"owner_design": ["POST /owner/designs", "GET /owner/designs", "GET /owner/designs/{design_id}", "PATCH /owner/designs/{design_id}", "POST /owner/designs/{design_id}/images", "DELETE /owner/designs/{design_id}/images/{image_id}", "POST /owner/designs/{design_id}/reanalyze", "PATCH /owner/designs/{design_id}/visibility", "DELETE /owner/designs/{design_id}"]}, "keywords": ["design", "llm", "image", "owner_tags", "reanalyze"], "checkpoints": ["디자인 이미지는 프론트와 백엔드 API 모두 최대 5장 제한으로 맞춤.", "사장님 화면은 pending+in_progress를 '분석 중' 한 상태로 묶어 표시."], "implementation_guides": ["이미지 갯수 검증: 디자인 이미지는 최소 1장에서 최대 5장까지만 등록 가능합니다. 프론트의 업로드 UI 컴포넌트에서도 5장이 차면 업로드 버튼을 숨기거나 비활성화해서 백엔드와 정책을 100% 맞춰주세요.", "오너 태그(owner_tags) 주의: 사장님이 직접 다는 태그는 반드시 `owner_tags`라는 키로 배열을 묶어서 보내야 합니다. 과거에 썼던 `tags`라는 이름으로 보내면 백엔드에서 무시되니 주의하세요.", "사용자 노출 조건 안내: 사장님이 디자인을 등록했다고 바로 유저 앱에 노출되지 않습니다. [사장님 계정 승인 + 샵 공개 상태 + 디자인 공개 상태 + AI 분석 완료] 4박자가 모두 맞아야 합니다. 따라서 '공개'로 설정되어 있어도 아직 노출 안 되는 상황이라면, 툴팁이나 배지로 'AI 분석 중이라 아직 노출되지 않습니다' 등을 친절하게 안내해주세요."], "playbook": {"api_sequence": ["[목록 진입]: 디자인(손톱 포트폴리오) 목록 화면 진입 시 `POST /owner/designs`를 호출합니다. 필터링을 위해 visibility와 ai_analysis_status 쿼리를 활용할 수 있습니다.", "[신규 등록]: 디자인 폼에 이미지(1~5장)와 가격, 설명 등을 채우고 [저장]을 누르면 프론트에서 유효성 검사 후 `POST /owner/designs`를 쏩니다.", "[상세 및 폴링]: 디자인 카드를 누르면 `POST /owner/designs`를 호출하여 가장 최신의 AI 분석 상태(status)와 결과값을 화면에 뿌려줍니다.", "[수정 처리]: 제목이나 가격, 태그 등을 수정하고 저장할 때는 `POST /owner/designs`를 호출합니다.", "[사진 교체 시 주의]: 사진을 추가(`POST .../images`)하거나 지울(`DELETE .../images/{id}`) 경우, 백엔드에서 AI 분석 상태를 다시 pending으로 돌려버리므로 화면에서도 뱃지를 즉시 '분석 중 ⏳'으로 덮어씌워야 합니다.", "[수동 재분석]: AI가 너무 이상하게 분석했거나 failed 떴을 때 누르는 재분석 버튼은 `POST /owner/designs/{design_id}/reanalyze`를 호출합니다."], "ui_events": [["[버튼] 새 디자인 등록", "POST /owner/designs", "등록 성공 토스트와 함께 목록 맨 위로 올려주고, 상태 뱃지는 무조건 'AI 분석 중'으로 달아줍니다.", "가장 흔한 에러인 필수값 누락이나 이미지 0장 업로드 시도는 API를 쏘기 전에 프론트에서 막고 폼 에러를 띄워주세요."], ["[버튼] 사진 추가/수정", "POST /owner/designs/{design_id}/images", "새 이미지가 렌더링되면서 동시에 디자인 전체의 뱃지를 '분석 중'으로 강제 전환시켜야 합니다.", "6장째 이미지를 올리려고 하면 파일 브라우저 창을 띄우지 말고 '최대 5장까지만 가능해요' 툴팁을 보여줍니다."], ["[버튼] AI 결과 수동 재분석", "POST /owner/designs/{design_id}/reanalyze", "버튼 클릭 즉시 화면 전체 또는 해당 카드를 로딩 스피너/분석 중 배지로 바꿔서 '작업이 들어갔다'는 피드백을 확실히 줍니다.", "수동 재분석이 허용되지 않는 상태(이미 분석 중 등)일 때 프론트에서 버튼을 흐리게(Disabled) 처리했는지 확인하세요."], ["[토글] 고객 노출 상태 변경", "PATCH /owner/designs/{design_id}/visibility", "성공하면 스위치가 초록색(ON)으로 바뀌고 리스트 뱃지도 active 갱신됩니다.", "아직 AI 분석이 덜 끝났거나(pending), 사장님 사업자 승인이 안 났다면 토글이 켜지지 않게 프론트에서 막아주세요."]], "states": ["`pending/in_progress`: 방금 사진을 올려서 서버 뒤에서 AI(LLM)가 열심히 깎고 태그를 다는 중인 상태입니다. 고객 앱에선 검색되지 않습니다.", "`done + active`: AI 분석도 무사히 끝나고, 사장님도 '공개' 토글을 켠 완벽한 영업 상태입니다. 고객이 볼 수 있습니다.", "`failed`: 사진 화질구지 등의 이유로 AI 분석이 실패해 멈춰버린 붉은색 상태입니다. 사장님께 '사진을 교체하거나 재분석 버튼을 눌러주세요'라는 가이드를 띄워야 합니다.", "`hidden`: 사장님이 자발적으로 공개를 끈 상태입니다. 포트폴리오 관리용으로 본인 눈에만 보입니다."], "qa": ["디자인 등록 폼에서 사진을 아예 안 올리거나, 6장을 꽉 채워 올리려 할 때 백엔드 에러 전에 프론트엔드가 자체적으로 에러 메시지와 함께 막는지 테스트해주세요.", "새로 디자인을 등록하자마자 리스트로 돌아왔을 때, '공개' 토글이 아직 켜지지 않도록 잘 막아뒀는지 눈으로 확인해주세요 (분석이 안 끝났으므로).", "일부러 이상한 사진을 올려 AI 분석이 `failed` 상태가 되었을 때, 화면에 빨간 경고창과 함께 [재분석하기] 버튼이 나타나는지 확인해주세요."]}, "front_refs": [{"id": "4", "level": 1, "title": "4. 디자인 등록 및 관리", "line": 149, "body": "", "excerpt": ""}, {"id": "4-1", "level": 2, "title": "4-1. 디자인 등록 (사장님 작업)", "line": 151, "body": "- 입력 항목: 디자인 제목, 설명, 가격(단일 입력), 소요시간(분), 시술 가능 디자이너 선택(복수), **사장님 태그(owner_tags, 0~N개 자유 입력 — 선택)**\n\n- **owner_tags 입력 UI**: 칩 입력 형태 (Enter/콤마로 추가, X로 삭제). 안내 문구: \"유저가 이 디자인을 검색할 때 잡힐 키워드. 비워둬도 등록·노출 가능하지만 입력하면 검색에 더 잘 잡힙니다 (AI 태그보다 가중치 높음)\"\n\n- 이미지 업로드: 최대 5장, 첫 번째 이미지가 썸네일. 백엔드도 디자인당 총 5장 제한을 API에서 검증\n\n- 등록 완료 즉시 DB 저장 → 사장님 작업 끝\n\n- 사장님 웹에는 '등록 완료' 상태로 표시", "excerpt": "- 입력 항목: 디자인 제목, 설명, 가격(단일 입력), 소요시간(분), 시술 가능 디자이너 선택(복수), **사장님 태그(owner_tags, 0~N개 자유 입력 — 선택)**\n- **owner_tags 입력 UI**: 칩 입력 형태 (Enter/콤마로 추가, X로 삭제). 안내 문구: \"유저가 이 디자인을 검색할 때 잡힐 키워드. 비워둬도 등록·노출 가능하지만 입력하면 검색에 더 잘 잡힙니다 (AI 태그보다 가중치 높음)\"\n- 이미지 업로드: 최대 5장, 첫 번째 이미지가 썸네일. 백엔드도 디자인당 총 5장 제한을 API에서 검증\n- 등록 완료 즉시 DB 저장 → 사장님 작업 끝\n- 사장님 웹에는 '등록 완료' 상태로 표시"}, {"id": "4-2", "level": 2, "title": "4-2. LLM 분석 (백그라운드 자동 처리)", "line": 163, "body": "- 백엔드가 등록된 디자인을 Queue에 순차 적재\n\n- 1단계 Transform: 원본 이미지에서 네일 영역 추출 및 규격화\n\n- 2단계 Classify: 태그 / 색상 / 분위기 / 스타일 자동 분류\n\n- 분석 완료된 디자인만 유저 앱에 노출\n\n**LLM 분석 상태 (사장님 화면 표시 단위 — 3단계)**\n\n| **사장님 화면 표시** | **백엔드 ai_analysis_status** | **설명** | **앱 노출** |\n| --- | --- | --- | --- |\n| 분석 중 | pending + in_progress | Queue 대기 + LLM 처리 중을 묶어 한 덩어리로 표시 | ❌ |\n| 분석 완료 | done | 태그/색상/스타일 분류 완료 | ✅ |\n| 분석 실패 | failed | 에러 코드와 함께 실패 사유 표시. [재분석] 버튼 노출 | ❌ |\n\n**LLM 분석 실패 에러 코드**\n\n| **에러 코드** | **설명** | **사장님 안내 문구** |\n| --- | --- | --- |\n| NO_NAIL | 사진에서 네일 감지 안 됨 | 손이 잘 보이는 사진으로 다시 올려주세요. |\n| LOW_QUALITY | 해상도 낮음 / 블러 / 조명 부족 | 좀 더 선명한 사진으로 시도해주세요. |\n| MULTIPLE_HANDS | 여러 명의 손이 섞임 | 한 사람의 손만 나오는 사진으로 올려주세요. |\n| OBSTRUCTED | 네일이 가려짐 | 네일이 잘 보이도록 다시 촬영해주세요. |\n| INAPPROPRIATE | 부적절 콘텐츠 감지 | 이 사진은 업로드할 수 없습니다. |\n| INTERNAL_ERROR | LLM 내부 에러 | 잠시 후 다시 시도해주세요. |\n\n- ⚠️ 미정: 분석 중 / 실패 상태 사장님 웹 표시 방식 (진행바 vs 뱃지 등)\n\n- **재분석 버튼 제공**: `ai_analysis_status=failed`인 디자인 상세에 [재분석] 버튼 노출. 클릭 시 `POST /owner/designs/{design_id}/reanalyze` 호출 → 상태 `pending`으로 되돌리고 큐 재투입. 사장님이 수동으로 다시 돌리고 싶을 때도 동일 버튼 사용 가능", "excerpt": "- 백엔드가 등록된 디자인을 Queue에 순차 적재\n- 1단계 Transform: 원본 이미지에서 네일 영역 추출 및 규격화\n- 2단계 Classify: 태그 / 색상 / 분위기 / 스타일 자동 분류\n- 분석 완료된 디자인만 유저 앱에 노출\n**LLM 분석 상태 (사장님 화면 표시 단위 — 3단계)**\n| **사장님 화면 표시** | **백엔드 ai_analysis_status** | **설명** | **앱 노출** |\n| --- | --- | --- | --- |\n| 분석 중 | pending + in_progress | Queue 대기 + LLM 처리 중을 묶어 한 덩어리로 표시 | ❌ |\n| 분석 완료 | done | 태그/색상/스타일 분류 완료 | ✅ |\n| 분석 실패 | failed | 에러 코드와 함께 실패 사유 표시. [재분석] 버튼 노출 | ❌ |\n**LLM 분석 실패 에러 코드**\n| **에러 코드** | **설명** | **사장님 안내 문구** |\n| --- | --- | --- |\n| NO_NAIL | 사진에서 네일 감지 안 됨 | 손이 잘 보이는 사진으로 다시 올려주세요. |\n| LOW_QUALITY | 해상도 낮음 / 블러 / 조명 부족 | 좀 더 선명한 사진으로 시도해주세요. |\n| MULTIPLE_HANDS | 여러 명의 손이 섞임 | 한 사람의 손만 나오는 사진으로 올려주세요. |\n| OBSTRUCTED "}, {"id": "4-3", "level": 2, "title": "4-3. 디자인 수정", "line": 196, "body": "- 제목, 설명, 가격, 소요시간, 시술 가능 디자이너 수정 가능\n\n- 이미지 추가 / 삭제 가능 (최대 5장 유지)\n\n- 이미지 변경 시 LLM 재분석 자동 실행 (백엔드가 ai_analysis_status를 pending으로 되돌리고 큐 재투입)", "excerpt": "- 제목, 설명, 가격, 소요시간, 시술 가능 디자이너 수정 가능\n- 이미지 추가 / 삭제 가능 (최대 5장 유지)\n- 이미지 변경 시 LLM 재분석 자동 실행 (백엔드가 ai_analysis_status를 pending으로 되돌리고 큐 재투입)"}, {"id": "4-4", "level": 2, "title": "4-4. 디자인 노출 / 숨김", "line": 204, "body": "- 사장님이 개별 디자인 노출 / 숨김 전환 가능\n\n- 숨김 처리된 디자인은 앱에 노출되지 않음\n\n- 분석 중 또는 분석 실패 상태는 자동 미노출", "excerpt": "- 사장님이 개별 디자인 노출 / 숨김 전환 가능\n- 숨김 처리된 디자인은 앱에 노출되지 않음\n- 분석 중 또는 분석 실패 상태는 자동 미노출"}, {"id": "4-5", "level": 2, "title": "4-5. 디자인 삭제", "line": 212, "body": "- 삭제 시 확인 모달 표시\n\n- **확정 예약이 있는 디자인 삭제**: hard delete 안 함. 백엔드가 자동으로 visibility=hidden + soft delete 처리 → 신규 노출 차단, 기존 confirmed 예약은 그대로 유지. 관련 예약이 모두 완료/취소된 후 30일 뒤 hard delete\n\n- 삭제 시 사장님에게 \"현재 X건의 확정 예약이 있는 디자인입니다. 삭제하면 신규 노출은 중단되지만 기존 예약은 정상 진행됩니다\" 안내 모달 권장", "excerpt": "- 삭제 시 확인 모달 표시\n- **확정 예약이 있는 디자인 삭제**: hard delete 안 함. 백엔드가 자동으로 visibility=hidden + soft delete 처리 → 신규 노출 차단, 기존 confirmed 예약은 그대로 유지. 관련 예약이 모두 완료/취소된 후 30일 뒤 hard delete\n- 삭제 시 사장님에게 \"현재 X건의 확정 예약이 있는 디자인입니다. 삭제하면 신규 노출은 중단되지만 기존 예약은 정상 진행됩니다\" 안내 모달 권장"}], "field_refs": [{"name": "title", "type": "string", "required": "필수", "note": "디자인 이름", "source_file": "spec_text/06_owner_design.md", "line": 29, "entity": "Design", "href": "http r_design.md", "line": 71, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L71"}, {"name": "ai_style_category", "type": "enum", "required": "자동", "note": "simple/glamour/...", "source_file": "spec_text/06_owner_design.md", "line": 77, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L77"}, {"name": "visibility", "type": "enum", "required": "자동", "note": "draft / active / hidden. 사장님 통제 영역. 기본 active. PATCH /owner/designs/{id}/visibility로 변경", "source_file": "spec_text/06_owner_design.md", "line": 83, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L83"}, {"name": "ai_analysis_status", "type": "enum", "required": "자동", "note": "pending / in_progress / done / failed. 시스템 통제 영역. 사장님 등록 직후 pending → 백그라운드 큐가 처리 → done/failed. failed 시 재분석 가능", "source_file": "spec_text/06_owner_design.md", "line": 89, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L89"}, {"name": "ai_analysis_started_at", "type": "timestamp", "required": "자동", "note": "LLM 큐 처리 시작 시각. UI에서 '분석 중 (X분 경과)' 표시용", "source_file": "spec_text/06_owner_design.md", "line": 95, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L95"}, {"name": "ai_analysis_completed_at", "type": "timestamp", "required": "자동", "note": "AI 분석 완료(done) 시각. failed 시에는 마지막 시도 시각", "source_file": "spec_text/06_owner_design.md", "line": 101, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L101"}, {"name": "favorite_count", "type": "int", "required": "자동", "note": "찜 수", "source_file": "spec_text/06_owner_design.md", "line": 107, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L107"}, {"name": "view_count", "type": "int", "required": "자동", "note": "조회수", "source_file": "spec_text/06_owner_design.md", "line": 113, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L113"}, {"name": "image_id", "type": "UUID", "required": "자동", "note": "백엔드 생성", "source_file": "spec_text/06_owner_design.md", "line": 127, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L127"}, {"name": "original_url", "type": "URL", "required": "필수", "note": "원본. 사장님만 접근", "source_file": "spec_text/06_owner_design.md", "line": 139, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L139"}, {"name": "cropped_url", "type": "URL", "required": "자동", "note": "LLM 1단계 결과", "source_file": "spec_text/06_owner_design.md", "line": 145, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L145"}, {"name": "sort_order", "type": "int", "required": "필수", "note": "0이 썸네일", "source_file": "spec_text/06_owner_design.md", "line": 151, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L151"}, {"name": "ai_transform_status", "type": "enum", "required": "자동", "note": "pending/done/failed", "source_file": "spec_text/06_owner_design.md", "line": 157, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L157"}, {"name": "ai_classify_status", "type": "enum", "required": "자동", "note": "pending/done/failed", "source_file": "spec_text/06_owner_design.md", "line": 163, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L163"}], "api_refs": [{"endpoint": "POST /owner/designs", "purpose": "내 단수 샵 디자인 등록 (사장님 응답 즉시 200, AI 분석은 백그라운드 큐). 이미지 최대 5장. owner_tags는 선택(0~N개). 등록 직후 visibility=active, ai_analysis_status=pending. 노출은 ai_analysis_status=done + shop.visibility=active + owner.verification_status=approved 이후", "params": "title, base_price, duration_minutes, available_designer_ids, images(max 5), owner_tags?", "source_file": "spec_text/06_owner_design.md", "line": 173, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L173"}, {"endpoint": "GET /owner/designs", "purpose": "내 단수 샵 디자인 목록. 필터로 visibility, ai_analysis_status 둘 다 사용 가능. 사장님 화면에서 '분석 중', '분석 실패', '숨김' 탭 구분", "params": "visibility, ai_analysis_status, cursor", "source_file": "spec_text/06_owner_design.md", "line": 178, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L178"}, {"endpoint": "GET /owner/designs/{design_id}", "purpose": "디자인 상세/LLM 분석 상태 조회", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 183, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L183"}, {"endpoint": "PATCH /owner/designs/{design_id}", "purpose": "디자인 정보 수정", "params": "title, description, base_price, duration_minutes, available_designer_ids, owner_tags", "source_file": "spec_text/06_owner_design.md", "line": 188, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L188"}, {"endpoint": "POST /owner/designs/{design_id}/images", "purpose": "디자인 이미지 추가. 디자인당 이미지 최대 5장 제한을 초과하면 VALIDATION_ERROR. 호출 시 백엔드가 design.ai_analysis_status를 pending으로 자동 되돌리고 LLM 큐에 재투입 (이미지 변경 자동 재분석 트리거)", "params": "image_urls(max total 5)", "source_file": "spec_text/06_owner_design.md", "line": 193, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L193"}, {"endpoint": "DELETE /owner/designs/{design_id}/images/{image_id}", "purpose": "디자인 이미지 삭제. 삭제 후 최소 1장 이상 남아야 함. 호출 시 design.ai_analysis_status를 pending으로 자동 되돌리고 LLM 큐에 재투입 (이미지 변경 자동 재분석 트리거)", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 198, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L198"}, {"endpoint": "POST /owner/designs/{design_id}/reanalyze", "purpose": "LLM 재분석 요청. ai_analysis_status=failed이거나 사장님이 수동으로 다시 돌리고 싶을 때. pending으로 되돌리고 큐에 재투입", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 203, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L203"}, {"endpoint": "PATCH /owner/designs/{design_id}/visibility", "purpose": "노출/숨김 변경", "params": "visibility", "source_file": "spec_text/06_owner_design.md", "line": 208, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L208"}, {"endpoint": "DELETE /owner/designs/{design_id}", "purpose": "디자인 삭제 또는 숨김 처리", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 198, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L198"}], "missing_front_sections": [], "missing_refs": [], "coverage": 1.0, "status": "connected"}, {"id": "5", "title": "예약 관리", "front_sections": ["5", "5-1", "5-2", "5-3", "5-4", "5-5", "5-6", "5-7", "5-8", "5-9"], "summary": "월간 캘린더, 예약 상세, 수락/거절/취소/완료/노쇼, 입금 확인 요청 뱃지.", "backend_files": ["spec_text/07_owner_reservation.md", "spec_text/04_user_discovery_reservation.md"], "entities": {"Reservation": ["reservation_id", "user_id", "shop_id", "design_id", "designer_id", "start_datetime", "end_datetime", "duration_minutes", "status", "total_price", "reservation_policy_snapshot", "payment_method_snapshot", "deposit_amount_snapshot", "bank_transfer_guide_snapshot", "user_payment_notified_at", "owner_payment_confirmed_at", "reminder_sent_at", "user_request_memo", "assigned_by", "idempotency_key", "cancel_reason", "cancelled_at", "completed_at", "no_show_at"]}, "apis": {"owner_reservation": ["GET /owner/reservations", "GET /owner/reservations/export", "GET /owner/reservations/{id}", "POST /owner/reservations/{id}/accept", "POST /owner/reservations/{id}/reject", "POST /owner/reservations/{id}/cancel", "POST /owner/reservations/{id}/payment-confirmed", "POST /owner/reservations/{id}/complete", "POST /owner/reservations/{id}/no-show", "GET /owner/designers/{id}/schedule"]}, "keywords": ["reservation", "calendar", "payment-confirmed", "no-show"], "checkpoints": ["CSV export는 API 후보가 있지만 MVP 1차 출시 제외로 표시되어야 함.", "입금 확인 요청 뱃지는 status/payment snapshot/입금 알림/사장님 확인 시각 4조건을 모두 봄."], "implementation_guides": ["신규 예약(pending)의 성격: pending 상태는 아직 해당 시간대가 캘린더에서 완벽히 잠긴(hard-lock) 상태가 아닙니다. 사장님 웹에서는 겹치는 시간대의 요청이라도 일단 모두 보여주되(created_at 오름차순), 사장님이 수락 버튼을 누르는 순간 겹치는지 최종 검사(CONFLICT 에러 반환)를 수행해야 합니다.", "계좌이체 예약 흐름: [계좌이체 샵]의 경우, 사장님이 예약을 수락하면 `payment_pending`(입금 대기) 상태가 됩니다. 유저가 앱에서 '입금 완료했어요!'를 눌러도 여전히 payment_pending입니다. 사장님이 통장 내역을 확인하고 [입금 확인 완료] 버튼을 눌러줘야 비로소 `confirmed`(확정)가 됩니다.", "노쇼(No-show) 버튼 제약: MVP에서는 악의적인 노쇼 처리를 방어하기 위해 예약이 `confirmed` 상태이고, 예약 시작 시간으로부터 30분이 지난 이후에만 노쇼 버튼을 활성화시켜주세요."], "playbook": {"api_sequence": ["[예약 목록 진입]: 예약 캘린더나 리스트에 들어올 때 `GET /owner/reservations?from=날짜&to=날짜&status=상태` 쿼리를 잘 조합해서 호출해 화면을 그립니다.", "[최신화 조회]: 특정 예약 카드를 눌러 팝업/모달 상세를 띄울 때는 방금 전 상태가 바뀌었을지 모르니 `GET /owner/reservations` 단건 조회를 한 번 더 날려 최신화합니다.", "[사장님의 응답]: 새 요청(pending)에 대해 [수락] 버튼은 `POST /owner/reservations/{id}/accept`, [거절] 버튼은 `POST /owner/reservations/{id}/reject`를 쏩니다.", "[계좌이체 확인]: 계좌이체 정책인 샵에서, 사장님이 유저의 입금 내역을 통장에서 직접 보고 누르는 [입금 확인 완료] 버튼은 `POST /owner/reservations/{id}/payment-confirmed`입니다.", "[시술 종료 후]: 유저가 시술을 받고 가면 `complete`, 안 나타나면 `no-show`, 예약이 취소되면 `cancel` API를 각각 날린 후 캘린더를 새로고침(refetch) 합니다."], "ui_events": [["[버튼] 예약 수락", "POST /owner/reservations/{id}/accept", "현장결제 샵이면 확정(confirmed) 녹색 뱃지로, 계좌이체 샵이면 입금대기(payment_pending) 주황색 뱃지로 변신시킵니다.", "그 사이 다른 고객이 낚아채서 CONFLICT가 나면 '앗, 이미 선점된 시간입니다' 모달을 띄워 상황을 알려줍니다."], ["[버튼] 입금 내역 확인 완료", "POST /owner/reservations/{id}/payment-confirmed", "입금 대기 딱지를 떼고 확정(confirmed) 뱃지로 바꾸며, 캘린더 해당 슬롯에 확정 디자인을 예쁘게 박아줍니다.", "혹시 그 사이 유저가 취소해서 409 에러가 나면 '취소된 예약입니다' 하고 화면을 새로고침시킵니다."], ["[버튼] 예약 거절", "POST /owner/reservations/{id}/reject", "목록에서 거절됨(rejected) 상태로 색상을 죽이거나, 필터 설정에 따라 아예 리스트에서 부드럽게 사라지게(애니메이션) 처리합니다.", "거절 사유 입력이 필수인데 사장님이 빈칸으로 냈다면, 텍스트 상자 주변을 붉게 흔들어주세요(Shake effect)."], ["[버튼] 노쇼(No-show) 처리", "POST /owner/reservations/{id}/no-show", "해당 예약을 붉은색 노쇼 배지로 덮고 더 이상 변경할 수 없게 만듭니다.", "정책상 예약 시작 시간 30분 전까지는 노쇼 버튼이 프론트엔드에서 회색(Disabled)으로 굳게 잠겨 있어야 합니다."], ["[버튼] 시술 완료 처리", "POST /owner/reservations/{id}/complete", "확정(confirmed) 예약의 시술이 끝나면 이 버튼을 눌러 상태를 completed로 변경합니다. 완료 후에는 유저가 리뷰를 작성할 수 있게 됩니다.", "이미 completed/cancelled/no_show 상태인 예약에서 이 버튼을 누르면 409 에러가 뜹니다. 프론트에서 confirmed 상태일 때만 버튼을 노출해주세요."], ["[버튼] 샵 사정 예약 취소", "POST /owner/reservations/{id}/cancel", "사장님 측 사정으로 예약을 취소합니다. 취소 사유(reason)는 필수 텍스트 입력이며, 유저에게 알림과 함께 사유가 전달됩니다.", "취소 사유 입력칸이 비어있으면 버튼을 비활성화하거나 '취소 사유를 입력해주세요' 인라인 에러를 표시해주세요. 이미 종료된 예약(completed/no_show)에서는 409 에러가 반환됩니다."]], "states": ["`pending`: 사장님의 수락/거절을 목빠지게 기다리는 신규 요청. 미처리 요청은 무조건 `created_at` 오름차순(먼저 온 사람 먼저)으로 보여주세요.", "`payment_pending`: 사장님은 수락했는데, 유저의 입금을 기다리는 상태. 또는 유저가 '입금했어요' 버튼을 눌러서 사장님이 통장을 뜯어봐야 하는 상태입니다.", "`confirmed`: 입금까지 다 끝나고 완벽히 캘린더 슬롯을 점유한 예약 확정 상태입니다. 시술 날짜가 다가오길 기다립니다.", "`completed` / `no_show` / `rejected`: 이미 끝난 옛날 예약들입니다. 아무 버튼도 누를 수 없는 완전한 읽기 전용 뷰로 그려주세요.", "`cancelled_by_user` / `cancelled_by_shop`: 누가 취소했는지 명확히 보여주는 취소 상태. 샵이 취소했다면 사장님이 썼던 취소 사유(cancel_reason)를 꼭 화면 어딘가에 보여주세요."], "qa": ["예약 관리 대시보드의 '신규 요청' 목록이 예약이 들어온 순서(생성된 시간순)대로 최상단부터 차곡차곡 쌓여서 잘 보이는지 확인해주세요.", "계좌이체 샵 예약에서 유저가 앱에서 [입금 완료]를 눌렀더라도, 사장님 화면에 아직 [입금 내역 확인 완료] 버튼이 떡하니 살아있고 확정 상태가 아닌지 교차 검증해주세요.", "동일한 시간에 겹치는 2개의 pending 예약 중 하나를 수락했을 때, 나머지 하나를 수락하려 하면 에러 팝업(CONFLICT)이 제대로 뜨며 막히는지 테스트하세요.", "확정된(confirmed) 예약 상세 화면에서, 시술 시간이 아직 30분도 안 지났는데 실수로 [노쇼 처리] 버튼을 누르지 못하도록 프론트에서 버튼을 비활성화해두었는지 확인해주세요."]}, "front_refs": [{"id": "5", "level": 1, "title": "5. 예약 관리", "line": 220, "body": "", "excerpt": ""}, {"id": "5-1", "level": 2, "title": "5-1. 예약 캘린더", "line": 222, "body": "- **MVP 기본 뷰: 월간만** (일간/주간 뷰 전환은 post-MVP)\n\n- 디자이너별 필터링 가능\n\n- 예약 상태별 색상 구분 표시\n\n- 캘린더에서 예약 클릭 시 예약 상세로 이동\n\n- 미처리 pending 예약은 별도 목록으로 created_at 오름차순(먼저 예약 요청한 순서) 표시. 같은 슬롯에 여러 pending 요청이 있으면 사장님이 목록 순서대로 응답하도록 유도\n\n- 백엔드 GET /owner/reservations는 from/to 임의 범위 지원하므로 추후 일간/주간 추가 시 백엔드 변경 없음", "excerpt": "- **MVP 기본 뷰: 월간만** (일간/주간 뷰 전환은 post-MVP)\n- 디자이너별 필터링 가능\n- 예약 상태별 색상 구분 표시\n- 캘린더에서 예약 클릭 시 예약 상세로 이동\n- 미처리 pending 예약은 별도 목록으로 created_at 오름차순(먼저 예약 요청한 순서) 표시. 같은 슬롯에 여러 pending 요청이 있으면 사장님이 목록 순서대로 응답하도록 유도\n- 백엔드 GET /owner/reservations는 from/to 임의 범위 지원하므로 추후 일간/주간 추가 시 백엔드 변경 없음"}, {"id": "5-2", "level": 2, "title": "5-2. 예약 상태 정의", "line": 236, "body": "| **상태값** | **설명** | **유저 앱 표시** | **사장님 웹 표시** |\n| --- | --- | --- | --- |\n| pending | 수락 대기 | 승인 대기 중 | 신규 예약 |\n| payment_pending | 입금 확인 대기 | 입금 확인 대기 | 입금 확인 대기 |\n| confirmed | 확정 | 예약 완료 | 확정 예약 |\n| rejected | 거절됨 | 거절됨 | 거절 예약 |\n| cancelled_by_user | 유저 취소 | 취소됨 | 유저 취소 |\n| cancelled_by_shop | 샵 취소 | 샵 사정으로 취소됨 | 샵 취소 |\n| no_show | 노쇼 | 노쇼 처리됨 | 노쇼 |\n| completed | 완료 | 리뷰 작성 유도 | 완료 |", "excerpt": "| **상태값** | **설명** | **유저 앱 표시** | **사장님 웹 표시** |\n| --- | --- | --- | --- |\n| pending | 수락 대기 | 승인 대기 중 | 신규 예약 |\n| payment_pending | 입금 확인 대기 | 입금 확인 대기 | 입금 확인 대기 |\n| confirmed | 확정 | 예약 완료 | 확정 예약 |\n| rejected | 거절됨 | 거절됨 | 거절 예약 |\n| cancelled_by_user | 유저 취소 | 취소됨 | 유저 취소 |\n| cancelled_by_shop | 샵 취소 | 샵 사정으로 취소됨 | 샵 취소 |\n| no_show | 노쇼 | 노쇼 처리됨 | 노쇼 |\n| completed | 완료 | 리뷰 작성 유도 | 완료 |"}, {"id": "5-3", "level": 2, "title": "5-3. 예약 상세 확인", "line": 249, "body": "- 표시 항목: 유저 정보, 디자인, 예약 시간, 담당 디자이너, 유저 요청사항, 예약 상태\n\n- 예약 운영 안내(취소 / 노쇼 정책) 스냅샷 확인 가능\n\n- **입금 확인 요청 뱃지 (계좌이체 샵 한정)**:\n  - 표시 조건: `status=payment_pending` AND `payment_method_snapshot=bank_transfer_guide` AND `user_payment_notified_at != null` AND `owner_payment_confirmed_at IS NULL`\n  - 즉 유저가 [입금 완료]를 눌렀고 사장님이 아직 처리 안 한 경우\n  - 캘린더에서도 해당 예약 칸에 시각 마커 표시 (색상 또는 작은 아이콘)\n  - 뱃지 클릭 시 모달 표시 — 두 가지 선택지\n    - **[입금 확인됨]** → `POST /owner/reservations/{id}/payment-confirmed` 호출 → `owner_payment_confirmed_at` 기록 → `confirmed` 전환 → 뱃지 사라짐\n    - **[샵 사정 취소]** (미입금 시) → 기존 `POST /owner/reservations/{id}/cancel` 호출 → cancelled_by_shop로 전환 → 뱃지 자연히 사라짐", "excerpt": "- 표시 항목: 유저 정보, 디자인, 예약 시간, 담당 디자이너, 유저 요청사항, 예약 상태\n- 예약 운영 안내(취소 / 노쇼 정책) 스냅샷 확인 가능\n- **입금 확인 요청 뱃지 (계좌이체 샵 한정)**:\n  - 표시 조건: `status=payment_pending` AND `payment_method_snapshot=bank_transfer_guide` AND `user_payment_notified_at != null` AND `owner_payment_confirmed_at IS NULL`\n  - 즉 유저가 [입금 완료]를 눌렀고 사장님이 아직 처리 안 한 경우\n  - 캘린더에서도 해당 예약 칸에 시각 마커 표시 (색상 또는 작은 아이콘)\n  - 뱃지 클릭 시 모달 표시 — 두 가지 선택지\n    - **[입금 확인됨]** → `POST /owner/reservations/{id}/payment-confirmed` 호출 → `owner_payment_confirmed_at` 기록 → `confirmed` 전환 → 뱃지 사라짐\n    - **[샵 사정 취소]** (미입금 시) → 기존 `POST /owner/reservations/{id}/cancel` 호출 → cancelled_by_shop로 전환 → 뱃지 자연히 사라짐"}, {"id": "5-4", "level": 2, "title": "5-4. 예약 수락 및 입금 안내", "line": 263, "body": "", "excerpt": ""}, {"id": "5-5", "level": 2, "title": "5-5. 예약 거절", "line": 295, "body": "- 거절 버튼 클릭 → 거절 사유 입력 (필수)\n\n- rejected 상태로 변경\n\n- 유저에게 거절 알림 + 사유 전달", "excerpt": "- 거절 버튼 클릭 → 거절 사유 입력 (필수)\n- rejected 상태로 변경\n- 유저에게 거절 알림 + 사유 전달"}, {"id": "5-6", "level": 2, "title": "5-6. 샵 사정 취소", "line": 303, "body": "- confirmed 예약을 사장님이 취소 가능\n\n- **취소 사유 입력 필수** (텍스트) — 거절(reject)과 동일하게 필수\n\n- cancelled_by_shop 상태로 변경\n\n- 유저에게 취소 알림 + 사유 전달", "excerpt": "- confirmed 예약을 사장님이 취소 가능\n- **취소 사유 입력 필수** (텍스트) — 거절(reject)과 동일하게 필수\n- cancelle ation/blob/main/spec_text/07_owner_reservation.md#L22"}, {"endpoint": "GET /owner/reservations/{id}", "purpose": "예약 상세", "params": "-", "source_file": "spec_text/07_owner_reservation.md", "line": 27, "group": "owner_reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/07_owner_reservation.md#L27"}, {"endpoint": "POST /owner/reservations/{id}/accept", "purpose": "예약 수락. 현장결제 샵은 confirmed로 전환, 계좌이체 예약금 안내 샵은 payment_pending으로 전환하고 유저에게 계좌/예약금 안내", "params": "-", "source_file": "spec_text/07_owner_reservation.md", "line": 32, "group": "owner_reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/07_owner_reservation.md#L32"}, {"endpoint": "POST /owner/reservations/{id}/reject", "purpose": "예약 거절", "params": "reason", "source_file": "spec_text/07_owner_reservation.md", "line": 37, "group": "owner_reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/07_owner_reservation.md#L37"}, {"endpoint": "POST /owner/reservations/{id}/cancel", "purpose": "샵 예약 취소", "params": "reason", "source_file": "spec_text/07_owner_reservation.md", "line": 42, "group": "owner_reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/07_owner_reservation.md#L42"}, {"endpoint": "POST /owner/reservations/{id}/payment-confirmed", "purpose": "[입금 확인됨] 처리 — 사장님이 통장에서 입금 확인 후 호출. 조건: status=payment_pending AND payment_method_snapshot=bank_transfer_guide AND user_payment_notified_at != null AND owner_payment_confirmed_at IS NULL. owner_payment_confirmed_at 기록 후 status=confirmed 전환. 그 외 조건에서는 409", "params": "-", "source_file": "spec_text/07_owner_reservation.md", "line": 47, "group": "owner_reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/07_owner_reservation.md#L47"}, {"endpoint": "POST /owner/reservations/{id}/complete", "purpose": "완료 처리", "params": "-", "source_file": "spec_t 호출하면 알아서 내 샵의 리뷰들만 가져옵니다.", "미답변 리뷰 필터 연동: 대시보드의 '미답변 리뷰(unanswered_review_count)' 카드를 클릭해서 리뷰 화면으로 넘어왔다면, 자동으로 `unanswered=true` 쿼리 필터가 적용된 상태로 렌더링되게 해주세요.", "답변 버튼 분기: 리뷰당 답변은 1개만 허용됩니다. `shop_reply` 데이터가 비어있다면 [답변 작성] 버튼을, 이미 채워져 있다면 [수정] / [삭제] 버튼을 노출하는 방식으로 화면을 분기해주세요."], "playbook": {"api_sequence": ["[리뷰 목록 진입]: 리뷰 화면에 처음 들어오면 `PATCH /reviews/{id}`에 sort, unanswered, cursor 등의 필터 쿼리 파라미터를 말아서 호출합니다.", "[미답변 필터 연동]: 대시보드에서 '미답변 리뷰 3건' 카드를 콕 찍어서 넘어온 경우엔 프론트 라우터가 똑똑하게 `unanswered=true` 쿼리를 물고 들어오게 렌더링해야 합니다.", "[답변 달기]: 사장님이 정성껏 쓴 답변을 저장할 때는 `POST /reviews/{id}/reply`, 오타를 고칠 때는 `POST /reviews/{id}/reply`, 지울 때는 `POST /reviews/{id}/reply`를 호출합니다.", "[상태 갱신]: 답변 관련 API(POST/PATCH/DELETE)를 쏘고 나면 해당 리뷰 카드 하나만 로컬 상태를 바꾸거나, 리스트 전체를 가볍게 refetch 해서 화면 싱크를 맞춥니다."], "ui_events": [["[버튼] 리뷰 답변 남기기", "POST /reviews/{id}/reply", "저장에 성공하면 입력창이 텍스트로 굳어지고, 리뷰 카드에 붙어있던 '미답변' 주황색 뱃지가 깔끔하게 사라집니다.", "혹시 네트워크 문제 등으로 중복 클릭되어 이미 답변이 존재하면(409), 자동으로 [수정] 모드 창으로 화면을 탈바꿈시켜줍니다."], ["[버튼] 답변 수정하기", "PATCH /reviews/{id}/reply", "수정 폼이 닫히면서 방금 고친 새 텍스트가 부드럽게 화면에 교체되어 렌더링됩니다.", "403 권한 에러가 뜬다면 '사장님 샵의 리뷰가 아닙니다'라는 다소 무서운 토스트를 띄웁니다."], ["[버튼] 답변 삭제하기", "DELETE /reviews/{id}/reply", "텍스트가 날아가고, 다시 입력 폼과 '미답변' 뱃지가 살포시 돌아오는 상태로 뷰를 되돌립니다.", "진짜 지울 건지 묻는 자그마한 확인 모달 팝업을 꼭 제공해주세요. (실수 방지)"], ["[필터] 정렬 기준 변경", "GET /owner/reviews", "별점순/최신순 탭을 누르면 기존 리스트 데이터를 비우고 스피너를 돈 다음 새 리스트를 착 뿌려줍니다.", "검색 결과가 0건이라면 허전하지 않게 '아직 이 조건에 맞는 리뷰가 없어요' 류의 일러스트 빈 화면을 보여줍니다."]], "states": ["`unanswered`: 사장님의 댓글을 기다리는 미답변 리뷰. 가장 눈에 띄게 주황색 배지 같은 걸 붙여주고 큼직한 [답변 작성] 버튼을 노출합니다.", "`answered`: 사장님이 이미 답글(`shop_reply`)을 달아준 리뷰. 답글 내용 밑에 작게 회색 글씨로 [수정] / [삭제] 텍스트 버튼만 붙여줍니다.", "`empty`: 리뷰가 한 개도 없거나, '미답변' 탭을 눌렀는데 다 답변해서 텅 빈 경우. 사장님께 뿌듯함을 주는 빈 상태(Empty State) 화면을 보여주세요."], "qa": ["사장님이 한 리뷰에 답글을 두 번 달려고 광클했을 때 프론트가 버튼을 잠그거나, 서버가 튕겨냈을 때 알아서 에러 처리가 잘 되는지 확인해주세요.", "[미답변 리뷰 모아보기] 탭에서 특정 리뷰에 답변을 쾅 달면, 그 즉시 그 리뷰 카드가 스르륵 리스트에서 사라지는 애니메이션(또는 렌더링 제외)이 잘 작동하는지 확인하세요.", "별점순 등 정렬 탭을 눌러 API를 다시 호출할 때 무한 스크롤용 `cursor` 변수를 깔끔하게 초기화(reset)해서 글 작성 API와 동일한 API를 씁니다. 서버가 알아서 '이건 사장님이 단 댓글이다'라고 인식하고 `author_type=shop`으로 저장해 줍니다. 댓글을 화면에 그릴 때 이 타입이면 '샵 공식' 뱃지를 예쁘게 달아주세요.", "신고 기능 제외: 스네일 신고 기능은 MVP 범위에서 제외되었습니다. UI 디자인에 신고 버튼이 있더라도 과감히 숨김 처리하고 기능 구현에 시간을 쓰지 마세요."], "playbook": {"api_sequence": ["[목록 진입]: 스네일 탭(커뮤니티)을 누르면 `GET /owner/snaps?cursor=` 무한 스크롤 API를 불러 우리 샵이 태그된 사진들만 구경합니다.", "[상세 조회]: 썸네일을 눌러 팝업/페이지로 들어가면 `GET /snaps/feed?tab=latest`로 본문과 최신 좋아요 수 등을 가져옵니다.", "[댓글 로딩]: 상세 화면 하단에서 `GET /snaps/{id}/comments`를 불러와 유저들의 반응을 주욱 나열해줍니다.", "[샵 댓글 처리]: 사장님이 샵 이름으로 댓글을 달거나 고치거나 지울 때는 기존 유저용 댓글 API(POST/PATCH/DELETE comments)를 그대로 재사용해 날리면 됩니다."], "ui_events": [["[행동] 스네일 상세 팝업 열기", "GET /snaps/{id}", "이미지 캐러셀, 본문 캡션, 샵/디자이너 태그 칩스, 그리고 댓글 영역을 한 화면에 예쁘게 펼쳐줍니다.", "혹시 그 사이 작성자가 글을 날려버려서 404가 뜬다면 팝업을 닫고 목록에서도 그 사진을 스윽 빼줍니다."], ["[버튼] 샵 공식 댓글 작성", "POST /snaps/{id}/comments", "댓글이 등록되면 리스트 최하단(혹은 상단 정렬에 맞춰)에 방금 쓴 댓글을 끼워넣어 줍니다. 이때 이름 옆에 예쁜 '샵 공식' 뱃지를 박아줍니다.", "빈 텍스트나 띄어쓰기만 입력하고 전송 버튼을 누르려 하면 버튼을 무시하거나 Disabled 처리해서 텅 빈 댓글을 막아주세요."], ["[버튼] 댓글 수정", "PATCH /comments/{id}", "수정 모드 입력창이 닫히며 고친 텍스트로 바로 업데이트합니다.", "사장님이 쓰지 않은 남의 댓글에는 애초에 이 수정/삭제 톱니바퀴 버튼이 렌더링되지 않도록 뷰를 잘 숨겨주세요."], ["[버튼] 댓글 삭제", "DELETE /comments/{id}", "해당 댓글 박스를 돔(DOM)에서 날려버리고 전체 댓글 카운트 숫자도 1 빼줍니다.", "실수로 지우지 않게 '정말 삭제할까요?'라는 네이티브 `confirm()`이나 커스텀 모달을 띄워줍니다."]], "states": ["`tagged_snap`: 리스트에 뜨는 모든 게시물은 내 샵(shop_id)이 태그(tagged_shop_id)된 고마운 홍보물입니다. 디자인 시 사진을 큼직하게 살려주세요.", "`shop_comment`: 일반 유저 댓글과 사장님이 단 댓글(`author_type=shop`)을 시각적으로 확 구분 지어 줘야 합니다. 사장님 프로필 테두리 색상을 다르게 하거나 특별한 왕관 뱃지를 달아주세요.", "`empty`: 아직 우리 샵을 태그해준 유저가 없어서 텅 빈 상태. 사장님이 우울해하지 않게 귀여운 안내 문구와 이미지를 넣어주세요."], "qa": ["사장님 스네일 탭에 진입했을 때, 정말로 우리 샵이 태그된 게시물들만 정확하게 필터링되어 리스트에 올라오는지 테스트 데이터로 확인해주세요.", "사장님 계정으로 남긴 댓글을 렌더링할 때, 일반 유저들이 쓴 댓글들과 UI적으로 명확히 구분되는 '샵 공식 마크'가 잘 그려지는지 확인해주세요.", "남이 쓴 일반 댓글 영역을 호버(Hover)하거나 클릭했을 때, 실수로라도 수정/삭제 액션 버튼 뭉치가 보이지 않게 프론트 코드로 단단히 숨겼는지 체크해주세요."]}, "front_refs": [{"id": "7", "level": 1, "title": "7. 스네일 확인", "line": 359, "body": "", "excerpt": ""}, {"id": "7-1", " uery parameter나 Router state에 해당 필터 조건(예: status=pending)을 잘 넘겨줘서 새로고침을 하더라도 필터가 풀리지 않게 꽉 잡아주세요."], "playbook": {"api_sequence": ["[대시보드 진입]: 홈 화면(대시보드)에 뜨면 복잡하게 여러 API 부를 것 없이 쿨하게 `GET /owner/dashboard/summary` 단일 API 하나만 쏴서 숫자 4개를 다 받아옵니다.", "[카드 라우팅]: 사장님이 4개의 지표 카드 중 하나를 누르면, 프론트엔드 라우터(Router)가 해당 페이지 경로로 이동시키면서 필수적인 필터 조건(Query params)을 뒤에 꼬리표처럼 달아줍니다.", "[예시]: '새 예약 요청 3건' 카드를 눌렀다면 라우터는 `/reservations?status=pending` 경로로 푸시하고, '미답변 리뷰' 카드는 `/reviews?unanswered=true`로 쏴줍니다."], "ui_events": [["[카드 클릭] 오늘 예약 O건", "화면 라우팅 이동", "예약 관리 달력 화면으로 넘어가면서, 달력이 오늘 날짜로 포커싱되고 오늘 스케줄 리스트가 쫙 펼쳐집니다.", "오늘 건이 0건이면 예약 화면 자체에서 빈 상태 UI를 잘 보여주면 됩니다."], ["[카드 클릭] 신규 예약 요청 O건", "화면 라우팅 이동", "예약 화면으로 넘어가면서 상단 필터가 '수락 대기(pending)' 상태로 탁 눌려있게 세팅합니다.", "브라우저 뒤로 가기나 새로고침을 해도 URL에 `status=pending`이 남아있어서 필터가 안 풀리는지 유심히 체크하세요."], ["[카드 클릭] 미답변 리뷰 O건", "화면 라우팅 이동", "리뷰 관리 화면으로 넘어가면서 탭이 '미답변'으로 맞춰져 있도록 렌더링합니다.", "거기서 답변을 달고 다시 대시보드로 돌아왔을 때, 숫자 카운트가 즉시 깎여서 갱신되어 있는지 캐시 무효화를 신경 써주세요."], ["[카드 클릭] 최근 스네일 태그", "화면 라우팅 이동", "내 샵이 태그된 스네일 탭으로 쓱 넘겨줍니다.", "목록에 진짜 태그가 0개면 스네일 탭 안에서 빈 화면 안내를 보여줍니다."]], "states": ["`loading`: 대시보드 API를 쏴서 숫자 4개를 기다리는 찰나의 순간. 뼈대만 있는 스켈레톤(Skeleton) UI나 펄스(Pulse) 애니메이션으로 카드를 예쁘게 흔들어주세요.", "`loaded`: API가 도착해서 카운트 숫자가 딱 박힌 듬직한 화면. 카드가 클릭 가능해집니다.", "`empty_zero`: 0이라는 숫자도 비정상이 아니라 당당한 데이터입니다. 에러처럼 보이지 않게 깔끔하게 '0건'이라고 그려주세요."], "qa": ["네트워크 탭을 열어서, 대시보드 화면 렌더링을 위해 정말로 `/owner/dashboard/summary` API 단 하나만 아주 가볍게 호출하고 끝나는지 확인해주세요.", "카드별로 클릭해서 넘어간 다음 화면(예약, 리뷰 등)에 진입했을 때, 사장님이 기대했던 대로 필터(수락 대기, 미답변 등)가 자동으로 착 켜져 있는지 직접 눌러가며 테스트하세요.", "카드 클릭해서 넘어갔다가 브라우저 F5(새로고침) 버튼을 빡 눌렀을 때, 필터 상태가 멍청하게 리셋되지 않고 URL 상태를 읽어서 끈질기게 필터를 유지하는지 꼼꼼히 점검해주세요.", "인터넷이 끊겼거나 백엔드 서버가 잠시 죽어서 API가 실패했을 때, 대시보드가 하얗게 터지지 않고 카드 안에 얌전하게 '데이터를 불러오지 못했습니다' 아이콘이 그려지는지 방어 코드(Error Boundary)를 체크하세요."]}, "front_refs": [{"id": "8", "level": 1, "title": "8. 대시보드 (홈)", "line": 379, "body": "", "excerpt": ""}, {"id": "8-1", "level": 2, "title": "8-1. 대시보드 구성", "line": 381, "body": "- 로그인 후 첫 화면으로 대시보드 표시\n\n- **데이터 소스**: GET /owner/dashboard/summary 단일 API 호출 (4지표 한 번에)\n\n- 표시 항목:\n  - **오늘 예약 수** (pending + payment_pending + confirmed) → 클릭 시 예약 캘린더로 이동\n  - **신규 예약 요청 수** (미처리 pending) → 클릭 시 예약 목록(pending 필터)로 이동\n  - **미답변 리뷰 수** (shop_reply IS NULL) → 클릭 시 리뷰 목록으로 이동\n  - **최근 스네일 태그 수** (최근 7일 본인 샵 태그 스네일) → 클릭 시 스네일 목록으로 이동\n\n- ⚠️ 미정: 대시보드 표시 항목 세부 UI 구성 (그리드/카드 디자인) UI 디자이너 협의 필요", "excerpt": "- 로그인 후 첫 화면으로 대시보드 표시\n- **데이터 소스**: GET /owner/dashboard/summary 단일 API 호출 (4지표 한 번에)\n- 표시 항목:\n  - **오늘 예약 수** (pending + payment_pending + confirmed) → 클릭 시 예약 캘린더로 이동\n  - **신규 예약 요청 수** (미처리 pending) → 클릭 시 예약 목록(pending 필터)로 이동\n  - **미답변 리뷰 수** (shop_reply IS NULL) → 클릭 시 리뷰 목록으로 이동\n  - **최근 스네일 태그 수** (최근 7일 본인 샵 태그 스네일) → 클릭 시 스네일 목록으로 이동\n- ⚠️ 미정: 대시보드 표시 항목 세부 UI 구성 (그리드/카드 디자인) UI 디자이너 협의 필요"}], "field_refs": [], "api_refs": [{"endpoint": "GET /owner/dashboard/summary", "purpose": "사장님 대시보드 홈 집계. 4개 지표를 한 번에 반환: today_reservation_count (오늘 pending+payment_pending+confirmed 합), pending_count (미처리 pending), unanswered_review_count (shop_reply IS NULL인 본인 샵 리뷰), recent_snap_tag_count (최근 7일 본인 샵 태그된 스네일). 캐싱 TTL 60초 권장", "params": "-", "source_file": "spec_text/07_owner_reservation.md", "line": 69, "group": "owner_dashboard", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/07_owner_reservation.md#L69"}], "missing_front_sections": [], "missing_refs": [], "coverage": 1.0, "status": "connected"}, {"id": "9", "title": "알림", "front_sections": ["9", "9-1", "9-2", "9-3"], "summary": "카카오 알림톡, 사장님 웹 알림함, 미읽음 뱃지, 딥링크, 모두 읽음.", "backend_files": ["spec_text/13_notifications.md"], "entities": {"OwnerNotification": ["notification_id", "owner_id", "type", "title", "body", "deeplink_target", "related_resource_type", "related_resource_id", "is_read", "read_at", "created_at", "kakao_sent_at"]}, "apis": {"owner_notification": ["GET /owner/notifications", "GET /owner/notifications/unread-count", "PATCH /owner/notifications/{notification_id}/read", "POST /owner/notifications/read-all"]}, "keywords": ["notification", "kakao", "inbox", "deep-link"], "checkpoints": ["웹푸시는 MVP 제외. 카카오 알림톡 + 웹 알림함 조합.", "알림 클릭 시 딥링크 이동과 읽음 처리가 함께 필요."], "implementation_guides": ["알림 채널 전략: MVP에서는 브라우저 웹푸시(Web Push) 알림을 지원하지 않습니다. 대신 유저의 카카오 알림톡으로 발송하며, 동시에 웹 알림함(inbox)에 데이터를 차곡차곡 쌓아줍니다. 알림함 종모양 아이콘을 메인 채널로 구성해주세요.", "읽음 처리 + 이동 동기화: 유저가 새 알림을 클릭하면, 먼저 `PATCH /owner/notifications/{notification_id}/read` API를 찔러 읽음 처리를 한 직후에, 알림 데이터에 있는 `deeplink_target` URL로 즉시 이동시켜주세요.", "알림함의 역할: 가끔 카카오 발송이 실패하더라도 웹 알림함 데이터는 무조건 생성되므로(신뢰성 100%), 사장님이 놓치는 일이 없도록 알림함 UI를 직관적으로 만들어주세요."], "playbook": {"api_sequence": ["[알림 팝오버 열기]: 우측 상단 종모양을 눌러 알림함을 열 때 무한 스크롤용 `GET /owner/notifications?cursor=` API를 호출해서 리스트를 깔아줍니다.", "[빨간 뱃지 갱신]: 화면 상단 종 아이콘 위 붉은 숫자 뱃지는 주기적으로 `GET /owner/notifications/unread-count`를 찔러서 안 읽은 갯수만 가볍게 그려냅니다.", "[알림 클릭 이벤트]: 개별 알림을 톡 누르면 제일 먼저 `PATCH /owner/notifications/{notification_id}/read`를 눈썹 휘날리게 쏴서 읽음 처리를 시킨 후, 알림 객체에 담겨있던 `deeplink_target` URL 주소로 사장님을 텔레포트 시켜줍니다.", "[모두 읽음 빗자루질]: '모두 읽음' 텍스트 버튼을 누르면 `POST /owner/notifications/read-all` API를 쏘고, 성공하자마자 뱃지 숫자를 0으로 확 날려버립니다."], "ui_events": [["[리스트 클릭] 알림 항목 선택", "PATCH /owner/notifications/{id}/read API 직후 라우팅", "알림 백그라운드 색이 '안 읽음(푸르스름)'에서 '읽음(흰색)'으로 슥 바뀌고, 해당 예약/리뷰 상세 페이지로 바로 넘어갑니다.", "만약 deeplink_target이 빈 값이거나 갈 곳이 애매한 알림이라면 어디 안 넘어가고 그냥 읽음 처리 색깔만 바꿔주세요."], ["[버튼] 모두 읽음", "POST /owner/notifications/read-all", "리스트에 있는 모든 알림의 배경색을 읽음(흰색)으로 싹 바꾸고, 종 아이콘 위 숫자 뱃지를 떼버립니다.", "통신이 실패하면 '앗, 다 못 읽었어요' 류의 재시도 토스트를 띄우고 숫자 뱃지를 원복시켜줍니다."], ["[스크롤 하단] 더 보기", "GET /owner/notifications", "스크롤이 바닥에 닿으면 다음 페이지 분량의 알림들을 리스트 맨 아래에 자연스럽게 이어 붙여줍니다(append).", "백엔드가 `has_next=false`를 주면 스피너를 없애고 더이상 API 헛발질을 하지 못하게 꽉 막아주세요."]], "states": ["`unread`: 사장님이 아직 안 읽은 신선한 알림. 배경색을 옅은 파란색이나 회색으로 칠해주고, 종 모양에는 뱃지 카운트를 달아 유혹합니다.", "`read`: 이미 읽어서 볼일 끝난 알림. 배경은 평범한 흰색으로 두고 글자 색상도 살짝 죽여줍니다(Dimmed).", "`empty`: 알림이 태초부터 한 개도 없거나 필터를 잘못 먹인 상태. '아직 도착한 알림이 없어요' 일러스트를 귀엽게 박아줍니다."], "qa": ["시퍼런 '안 읽은 알림'을 하나 클릭했을 때, 상세 화면으 ist.md`(남은 할일)를 쓱 훑어봅니다.", "[기획 핑퐁]: 미정 항목(예: 예약 취소 패널티 금액 등)이 프론트 UI 로직에 지대한 영향을 미칠 것 같으면, 내 맘대로 if문 짜지 말고 기획자나 백엔드 담당자 슬랙으로 핑을 쳐서 결정을 독촉하세요.", "[문서 재생성]: 핑퐁이 끝나서 백엔드가 정책을 확정하고 파이썬 스크립트를 한 바퀴 돌리면(`build_all_collaboration_outputs.py`), 여러분이 보고 계신 이 HTML 문서와 AI 프롬프트용 텍스트가 마법처럼 촤라락 최신본으로 업데이트됩니다."], "ui_events": [["[액션] 미정 정책 발견", "API 호출 금지", "이 부분은 일단 TODO 주석으로 비워두거나 더미 컴포넌트로 대충 자리만 잡아둡니다.", "자체적으로 하드코딩해서 '3번 지각하면 강퇴' 같은 상상 로직을 박아두지 마세요. 나중에 치우기 힘듭니다."], ["[액션] 결정 사항 UI 반영", "최신 API 명세 적용", "새로 뽑힌 HTML이나 AI 요약본(`ai.txt`)을 커서(Cursor)나 코파일럿에 통째로 먹여서 짜달라고 합니다.", "백엔드가 노션(Notion)에 올려둔 공유 링크의 문서 버전이 최신 날짜로 바뀌었는지 꼭 확인하고 작업에 들어가세요."]], "states": ["`open`: 기획팀도 백엔드도 아직 머리 싸매고 고민 중인 상태. 프론트는 이 부분 건드리지 말고 딴 거 먼저 만드세요.", "`decided`: 드디어 결판이 나서 수치가 문서에 박힌 상태. 이제 프론트 구현 페달을 밟아도 좋습니다.", "`changed`: 엎어진 정책. 기존에 이미 프론트 UI로 짜둔 게 있다면 그 컴포넌트 뜯어고쳐야 하니 영향도를 먼저 파악하세요."], "qa": ["우리 프론트엔드 소스코드 전역 검색을 돌렸을 때, 미정이었던 정책 수치(예: 7일 전 100% 환불 등)가 하드코딩 상수(const)로 억지로 박혀있는 곳이 없는지 매의 눈으로 확인해주세요.", "기획자가 정책을 슥 바꿨다고 했을 때, 냅다 코드부터 치지 말고 관련된 팝업 문구, 확인 버튼 상태, API Payload 모양새까지 패키지로 잘 바뀌었는지 흐름 전체를 챙겨주세요.", "우리가 보고 있는 이 HTML 문서와 AI 요약본 파일의 생성 시각(우측 상단 메타데이터)이 최신 날짜로 잘 찍혀있는지 한 번만 확인하고 코딩을 시작합시다."]}, "front_refs": [{"id": "10", "level": 1, "title": "10. 미정 / 추가 확인 필요 항목", "line": 431, "body": "| **섹션** | **항목** | **현재 상태** |\n| --- | --- | --- |\n| 4. 디자인 | LLM 분석 중 표시 UI 디테일 (진행바/뱃지 등 형태) | UI 협의 필요 |\n| 8. 대시보드 | 대시보드 표시 항목 세부 UI 구성 (그리드/카드 디자인) | UI 협의 필요 |\n| 9. 알림 | 사장님 응답 리마인드 시간값 재조정 가능성 (현재 1h) | 운영 데이터 후 |\n\n**v1 → v1.1 확정 사항 (누적)**\n\n| **섹션** | **항목** | **확정 내용** |\n| --- | --- | --- |\n| 1. 로그인 | 사업자 인증 게이트 | 백엔드 403 VERIFICATION_REQUIRED 코드 도입. UI 비활성화 + 서버 검증 이중 가드 |\n| 1. 로그인 | 승인 전 초안 작성 | 사업자 승인 전에도 샵/디자이너/디자인 초안 작성 가능. 공개/예약 운영만 승인 후 허용 |\n| 1. 로그인 | 비밀번호 정책 | 8자 이상 + 영문/숫자 조합 1개 이상 |\n| 1. 로그인 | 비밀번호 재설정 | 이메일 토큰 2단계 (15분 TTL, 1회 사용). MVP 포함 |\n| 1. 로그인 | 로그인 실패 제한 | 5회 연속 실패 시 5분 잠금 |\n| 2. 샵 설정 | 예약금 개념 | 채택. 샵 단위 고정 정액 + 계좌이체 샵만 적용. 최소 1,000원 / 최대 디자인 가격 100% |\n| 2. 샵 설정 | 계좌 정보 입력 | 은행명/계좌번호/예금주 3필드 분리 입력 |\n| 2. 샵 설정 | 현장결제 의미 | 예약금 없음, 시술 당일 전액 결제 |\n| 2. 샵 설정 | 자동수락 ⟹ 현장결제 강제 | (자동수락+계좌이체) 조합 불허. 백엔드 VALIDATION_ERROR |\n| 2. 샵 설정 | 자동수락 기본값 | false(수동수락) |\n| 2. 샵 설정 | 단수 샵 정책 | 1사장님=1샵. 사장님 웹 API는 /owner/shop 기준 |\n| 2. 샵 설정 | 샵 다중 이미지 | image_urls 배열 최대 10장 + thumbnail_url 별도 (대표 사진 명시 지정) |\n| 4. 디자인 | owner_tags 정책 | 0~N개 자유 입력 (필수 X). 노출 조건은 승인된 사장님 + 공개 샵 + 공개 디자인 + ai_analysis_status=done |\n| 4. 디자인 | 재분석 버튼 | 제공 + 이미지 변경 시 자동 트리거 |\n| 4. 디자인 | 이미지 제한 | 디자인당 최대 5장. 백엔드 API에서 총량 검증 |\n| 4. 디자인 | 분석 상태 표시 단위 | 사장님 화면 3단계 (pending+in_progress='분석 중') |\n| 4. 디자인 | 확정 예약 있는 디자인 삭제 | visibility=hidden + soft delete 자동 처리 |\n| 5. 예약 | 계좌이체 확정 흐름 | 계좌이체 샵은 사장님 수락 후 payment_pending, 유저 [입금 완료] 후 사장님 [입금 확인됨] 처리 시 confirmed |\n| 5. 예약 | 미입금 처리 | 자동 만료 없음, 사장님 수동 취소 |\n| 5. 예약 | 입금 확인 요청 뱃지 | 사장님 [입금 확인됨] 버튼 또는 [샵 사정 취소]로 처리 시 사라짐 |\n| 5. 예약 | pending 목록 | 미처리 pending은 created_at 오름차순으로 목록 표시 |\n| 5. 예약 | 샵 사정 취소 사유 | 필수 (텍스트 입력) |\n| 5. 예약 | 캘린더 뷰 | MVP 월간만, 일간/주간은 post-MVP |\n| 5. 예약 | CSV export | MVP 제외 (post-MVP 큐로 분류) |\n| 6. 리뷰 | 답변 수정/삭제 | PATCH/DELETE /reviews/{id}/reply API 제공 |\n| 6. 리뷰 | 정렬 옵션 | 최신순(기본) / 별점 높은순 / 별점 낮은순 |\n| 6. 리뷰 | 사장님 리뷰 API | 단수 샵 정책 기준 GET /owner/reviews |\n| 7. 스네일 | 사장님 스네일 API | 단수 샵 정책 기준 GET /owner/snaps |\n| 8. 대시보드 | 집계 API | GET /owner/dashboard/summary 단일 API (4지표) |\n| 9. 알림 | 웹푸시 채택 | 제외 (카카오 알림톡 + 알림함 조합) |\n| 9. 알림 | 사장님 알림함 | 도입 (OwnerNotification 엔티티 영속화) |\n| 9. 알림 | 응답 리마인드 시간 | pending 1시간 경과 시 1회 발송 |\n| 9. 알림 | 카톡 발송 실패 처리 | 알림함은 적재 + 자동 재시도 3회(지수 backoff) |\n| 검색 | 검색 엔진 | Elasticsearch + nori, MVP부터 도입 |\n| 검색 | 필드 가중치 | title^5 / owner_tags^4 / ai_tags^3 / description^2 / shop.name^1.5 / shop.region^1.5 |\n| 검색 | 0건 폴백 | recommendations 별도 필드 + 프론트 분리 노출 |\n| 검색 | 위치 처리 | Shop.region 자동 파싱, 검색 q에 매칭 + 별도 필터 지원 |\n| 검색 | 자동완성/인기 태그 | MVP 제외 |\n| 공통 | 이미지 업로드 | presigned URL + 권한 1회 체크 + 10MB 제한 + 서버 워커 리사이즈 |", "excerpt": "| **섹션** | **항목** | **현재 상태** |\n| --- | --- | --- |\n| 4. 디자인 | L
