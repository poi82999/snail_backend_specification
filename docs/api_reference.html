<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snail API 계약 (OpenAPI)</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d7dde6;
      --text: #17202a;
      --muted: #667485;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Malgun Gothic", sans-serif;
      font-size: 14px;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 20px;
      letter-spacing: 0;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
    }
    a:hover { text-decoration: underline; }
    redoc {
      display: block;
      min-height: calc(100vh - 73px);
      background: var(--panel);
    }
    @media (max-width: 720px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }
      a { white-space: normal; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Snail API 계약 (OpenAPI)</h1>
      <div class="meta">정적 docs/openapi.json을 Redoc으로 탐색합니다. 앱·웹·프론트 codegen 입력과 동일한 계약입니다.</div>
    </div>
    <a href="openapi.json">openapi.json</a>
  </header>
  <redoc spec-url="openapi.json"></redoc>
  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
</body>
</html>
