name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: snail
          POSTGRES_PASSWORD: snail
          POSTGRES_DB: snail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U snail -d snail"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      ENV: local
      DATABASE_URL: postgresql+asyncpg://snail:snail@localhost:5432/snail
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: dev-only-change-me-32-chars-minimum

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check formatting
        run: ruff format --check app tests alembic

      - name: Lint
        run: ruff check app tests alembic

      - name: Type check
        run: mypy app

      - name: Migrate
        run: alembic upgrade head

      - name: Test unit and integration
        run: pytest -m "not e2e"

      - name: Test e2e
        run: pytest tests/e2e -m e2e -v

      # 백엔드 코드 파생 계약 산출물이 코드와 어긋나면 실패 (스펙 인덱스는 validate.yml이 담당)
      - name: Regenerate contract artifacts
        working-directory: ${{ github.workspace }}
        run: |
          python tools/export_openapi.py
          python tools/build_contract_reference.py
          python tools/build_ai_onboarding_bundles.py

      - name: Fail on contract drift
        working-directory: ${{ github.workspace }}
        run: |
          CHANGED="$(git status --porcelain -- docs/)"
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED"
            git --no-pager diff -- docs/ | head -200
            echo "::error::docs/ 계약 산출물이 backend 코드와 어긋납니다. tools/ 생성기를 재실행 후 커밋하세요."
            exit 1
          fi
