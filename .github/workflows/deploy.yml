name: Deploy (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGION: asia-northeast3
  REPO: snail-backend
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/snail-backend

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure docker
        run: gcloud auth configure-docker --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCE
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCE_HOST }} >> ~/.ssh/known_hosts

      - name: Sync compose files
        run: |
          scp backend/docker/docker-compose.prod.yml \
              backend/docker/Caddyfile \
              ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:/opt/snail/

      - name: Pull, migrate, restart
        run: |
          ssh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} bash <<'EOF'
            set -euo pipefail
            cd /opt/snail
            export GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
            export IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
            export CLOUD_SQL_INSTANCE_CONNECTION_NAME="${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}"
            export API_DOMAIN="${{ secrets.API_DOMAIN }}"
            docker compose -f docker-compose.prod.yml pull
            # cloud-sql-proxy + redis 먼저 띄우고 마이그레이션 → 그 다음 api/worker
            docker compose -f docker-compose.prod.yml up -d cloud-sql-proxy redis
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d
          EOF

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if curl -fsS https://${{ secrets.API_DOMAIN }}/api/v1/health; then
              echo "✅ healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ health check failed (60s timeout)"
          exit 1
