님 태그(owner_tags, 0~N개 자유 입력 — 선택)**\n\n- **owner_tags 입력 UI**: 칩 입력 형태 (Enter/콤마로 추가, X로 삭제). 안내 문구: \"유저가 이 디자인을 검색할 때 잡힐 키워드. 비워둬도 등록·노출 가능하지만 입력하면 검색에 더 잘 잡힙니다 (AI 태그보다 가중치 높음)\"\n\n- 이미지 업로드: 최대 5장, 첫 번째 이미지가 썸네일. 백엔드도 디자인당 총 5장 제한을 API에서 검증\n\n- 등록 완료 즉시 DB 저장 → 사장님 작업 끝\n\n- 사장님 웹에는 '등록 완료' 상태로 표시", "excerpt": "- 입력 항목: 디자인 제목, 설명, 가격(단일 입력), 소요시간(분), 시술 가능 디자이너 선택(복수), **사장님 태그(owner_tags, 0~N개 자유 입력 — 선택)**\n- **owner_tags 입력 UI**: 칩 입력 형태 (Enter/콤마로 추가, X로 삭제). 안내 문구: \"유저가 이 디자인을 검색할 때 잡힐 키워드. 비워둬도 등록·노출 가능하지만 입력하면 검색에 더 잘 잡힙니다 (AI 태그보다 가중치 높음)\"\n- 이미지 업로드: 최대 5장, 첫 번째 이미지가 썸네일. 백엔드도 디자인당 총 5장 제한을 API에서 검증\n- 등록 완료 즉시 DB 저장 → 사장님 작업 끝\n- 사장님 웹에는 '등록 완료' 상태로 표시"}, {"id": "4-2", "level": 2, "title": "4-2. LLM 분석 (백그라운드 자동 처리)", "line": 163, "body": "- 백엔드가 등록된 디자인을 Queue에 순차 적재\n\n- 1단계 Transform: 원본 이미지에서 네일 영역 추출 및 규격화\n\n- 2단계 Classify: 태그 / 색상 / 분위기 / 스타일 자동 분류\n\n- 분석 완료된 디자인만 유저 앱에 노출\n\n**LLM 분석 상태 (사장님 화면 표시 단위 — 3단계)**\n\n| **사장님 화면 표시** | **백엔드 ai_analysis_status** | **설명** | **앱 노출** |\n| --- | --- | --- | --- |\n| 분석 중 | pending + in_progress | Queue 대기 + LLM 처리 중을 묶어 한 덩어리로 표시 | ❌ |\n| 분석 완료 | done | 태그/색상/스타일 분류 완료 | ✅ |\n| 분석 실패 | failed | 에러 코드와 함께 실패 사유 표시. [재분석] 버튼 노출 | ❌ |\n\n**LLM 분석 실패 에러 코드**\n\n| **에러 코드** | **설명** | **사장님 안내 문구** |\n| --- | --- | --- |\n| NO_NAIL | 사진에서 네일 감지 안 됨 | 손이 잘 보이는 사진으로 다시 올려주세요. |\n| LOW_QUALITY | 해상도 낮음 / 블러 / 조명 부족 | 좀 더 선명한 사진으로 시도해주세요. |\n| MULTIPLE_HANDS | 여러 명의 손이 섞임 | 한 사람의 손만 나오는 사진으로 올려주세요. |\n| OBSTRUCTED | 네일이 가려짐 | 네일이 잘 보이도록 다시 촬영해주세요. |\n| INAPPROPRIATE | 부적절 콘텐츠 감지 | 이 사진은 업로드할 수 없습니다. |\n| INTERNAL_ERROR | LLM 내부 에러 | 잠시 후 다시 시도해주세요. |\n\n- ⚠️ 미정: 분석 중 / 실패 상태 사장님 웹 표시 방식 (진행바 vs 뱃지 등)\n\n- **재분석 버튼 제공**: `ai_analysis_status=failed`인 디자인 상세에 [재분석] 버튼 노출. 클릭 시 `POST /owner/designs/{design_id}/reanalyze` 호출 → 상태 `pending`으로 되돌리고 큐 재투입. 사장님이 수동으로 다시 돌리고 싶을 때도 동일 버튼 사용 가능", "excerpt": "- 백엔드가 등록된 디자인을 Queue에 순차 적재\n- 1단계 Transform: 원본 이미지에서 네일 영역 추출 및 규격화\n- 2단계 Classify: 태그 / 색상 / 분위기 / 스타일 자동 분류\n- 분석 완료된 디자인만 유저 앱에 노출\n**LLM 분석 상태 (사장님 화면 표시 단위 — 3단계)**\n| **사장님 화면 표시** | **백엔드 ai_analysis_status** | **설명** | **앱 노출** |\n| --- | --- | --- | --- |\n| 분석 중 | pending + in_progress | Queue 대기 + LLM 처리 중을 묶어 한 덩어리로 표시 | ❌ |\n| 분석 완료 | done | 태그/색상/스타일 분류 완료 | ✅ |\n| 분석 실패 | failed | 에러 코드와 함께 실패 사유 표시. [재분석] 버튼 노출 | ❌ |\n**LLM 분석 실패 에러 코드**\n| **에러 코드** | **설명** | **사장님 안내 문구** |\n| --- | --- | --- |\n| NO_NAIL | 사진에서 네일 감지 안 됨 | 손이 잘 보이는 사진으로 다시 올려주세요. |\n| LOW_QUALITY | 해상도 낮음 / 블러 / 조명 부족 | 좀 더 선명한 사진으로 시도해주세요. |\n| MULTIPLE_HANDS | 여러 명의 손이 섞임 | 한 사람의 손만 나오는 사진으로 올려주세요. |\n| OBSTRUCTED "}, {"id": "4-3", "level": 2, "title": "4-3. 디자인 수정", "line": 196, "body": "- 제목, 설명, 가격, 소요시간, 시술 가능 디자이너 수정 가능\n\n- 이미지 추가 / 삭제 가능 (최대 5장 유지)\n\n- 이미지 변경 시 LLM 재분석 자동 실행 (백엔드가 ai_analysis_status를 pending으로 되돌리고 큐 재투입)", "excerpt": "- 제목, 설명, 가격, 소요시간, 시술 가능 디자이너 수정 가능\n- 이미지 추가 / 삭제 가능 (최대 5장 유지)\n- 이미지 변경 시 LLM 재분석 자동 실행 (백엔드가 ai_analysis_status를 pending으로 되돌리고 큐 재투입)"}, {"id": "4-4", "level": 2, "title": "4-4. 디자인 노출 / 숨김", "line": 204, "body": "- 사장님이 개별 디자인 노출 / 숨김 전환 가능\n\n- 숨김 처리된 디자인은 앱에 노출되지 않음\n\n- 분석 중 또는 분석 실패 상태는 자동 미노출", "excerpt": "- 사장님이 개별 디자인 노출 / 숨김 전환 가능\n- 숨김 처리된 디자인은 앱에 노출되지 않음\n- 분석 중 또는 분석 실패 상태는 자동 미노출"}, {"id": "4-5", "level": 2, "title": "4-5. 디자인 삭제", "line": 212, "body": "- 삭제 시 확인 모달 표시\n\n- **확정 예약이 있는 디자인 삭제**: hard delete 안 함. 백엔드가 자동으로 visibility=hidden + soft delete 처리 → 신규 노출 차단, 기존 confirmed 예약은 그대로 유지. 관련 예약이 모두 완료/취소된 후 30일 뒤 hard delete\n\n- 삭제 시 사장님에게 \"현재 X건의 확정 예약이 있는 디자인입니다. 삭제하면 신규 노출은 중단되지만 기존 예약은 정상 진행됩니다\" 안내 모달 권장", "excerpt": "- 삭제 시 확인 모달 표시\n- **확정 예약이 있는 디자인 삭제**: hard delete 안 함. 백엔드가 자동으로 visibility=hidden + soft delete 처리 → 신규 노출 차단, 기존 confirmed 예약은 그대로 유지. 관련 예약이 모두 완료/취소된 후 30일 뒤 hard delete\n- 삭제 시 사장님에게 \"현재 X건의 확정 예약이 있는 디자인입니다. 삭제하면 신규 노출은 중단되지만 기존 예약은 정상 진행됩니다\" 안내 모달 권장"}], "field_refs": [{"name": "title", "type": "string", "required": "필수", "note": "디자인 이름", "source_file": "spec_text/06_owner_design.md", "line": 29, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L29"}, {"name": "description", "type": "text", "required": "선택", "note": "설명/홍보 문구", "source_file": "spec_text/06_owner_design.md", "line": 35, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L35"}, {"name": "base_price", "type": "int", "required": "필수", "note": "가격", "source_file": "spec_text/06_owner_design.md", "line": 41, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L41"}, {"name": "duration_minutes", "type": "int", "required": "필수", "note": "예약 슬롯 계산", "source_file": "spec_text/06_owner_design.md", "line": 47, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L47"}, {"name": "available_designer_ids", "type": "UUID[]", "required": "필수", "note": "자동 배정 후보", "source_file": "spec_text/06_owner_design.md", "line": 53, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L53"}, {"name": "owner_tags", "type": "string[]", "required": "선택", "note": "사장님이 직접 입력하는 해시태그. 0~N개 자유 입력. 노출 조건에서 제외(0개여도 등록/노출 가능). 검색에서는 ai_tags와 함께 사용되며 더 높은 가중치를 받음 (사장님 의도 신호로 해석)", "source_file": "spec_text/06_owner_design.md", "line": 59, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L59"}, {"name": "ai_tags", "type": "string[]", "required": "자동", "note": "LLM 2단계 결과. owner_tags와 별도 필드로 보관. 검색에서는 두 태그를 모두 사용하되 가중치/표시 분리 가능", "source_file": "spec_text/06_owner_design.md", "line": 65, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L65"}, {"name": "ai_color_palette", "type": "string[]", "required": "자동", "note": "LLM 2단계 결과", "source_file": "spec_text/06_owner_design.md", "line": 71, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L71"}, {"name": "ai_style_category", "type": "enum", "required": "자동", "note": "simple/glamour/...", "source_file": "spec_text/06_owner_design.md", "line": 77, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L77"}, {"name": "visibility", "type": "enum", "required": "자동", "note": "draft / active / hidden. 사장님 통제 영역. 기본 active. PATCH /owner/designs/{id}/visibility로 변경", "source_file": "spec_text/06_owner_design.md", "line": 83, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L83"}, {"name": "ai_analysis_status", "type": "enum", "required": "자동", "note": "pending / in_progress / done / failed. 시스템 통제 영역. 사장님 등록 직후 pending → 백그라운드 큐가 처리 → done/failed. failed 시 재분석 가능", "source_file": "spec_text/06_owner_design.md", "line": 89, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L89"}, {"name": "ai_analysis_started_at", "type": "timestamp", "required": "자동", "note": "LLM 큐 처리 시작 시각. UI에서 '분석 중 (X분 경과)' 표시용", "source_file": "spec_text/06_owner_design.md", "line": 95, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L95"}, {"name": "ai_analysis_completed_at", "type": "timestamp", "required": "자동", "note": "AI 분석 완료(done) 시각. failed 시에는 마지막 시도 시각", "source_file": "spec_text/06_owner_design.md", "line": 101, "entity": "Design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L101"}, {"name": "original_url", "type": "URL", "required": "필수", "note": "원본. 사장님만 접근", "source_file": "spec_text/06_owner_design.md", "line": 139, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L139"}, {"name": "cropped_url", "type": "URL", "required": "자동", "note": "LLM 1단계 결과", "source_file": "spec_text/06_owner_design.md", "line": 145, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L145"}, {"name": "sort_order", "type": "int", "required": "필수", "note": "0이 썸네일", "source_file": "spec_text/06_owner_design.md", "line": 151, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L151"}, {"name": "ai_transform_status", "type": "enum", "required": "자동", "note": "pending/done/failed", "source_file": "spec_text/06_owner_design.md", "line": 157, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L157"}, {"name": "ai_classify_status", "type": "enum", "required": "자동", "note": "pending/done/failed", "source_file": "spec_text/06_owner_design.md", "line": 163, "entity": "DesignImage", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L163"}], "api_refs": [{"endpoint": "POST /owner/designs", "purpose": "내 단수 샵 디자인 등록 (사장님 응답 즉시 200, AI 분석은 백그라운드 큐). 이미지 최대 5장. owner_tags는 선택(0~N개). 등록 직후 visibility=active, ai_analysis_status=pending. 노출은 ai_analysis_status=done + shop.visibility=active + owner.verification_status=approved 이후", "params": "title, base_price, duration_minutes, available_designer_ids, images(max 5), owner_tags?", "source_file": "spec_text/06_owner_design.md", "line": 173, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L173"}, {"endpoint": "GET /owner/designs", "purpose": "내 단수 샵 디자인 목록. 필터로 visibility, ai_analysis_status 둘 다 사용 가능. 사장님 화면에서 '분석 중', '분석 실패', '숨김' 탭 구분", "params": "visibility, ai_analysis_status, cursor", "source_file": "spec_text/06_owner_design.md", "line": 178, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L178"}, {"endpoint": "GET /owner/designs/{design_id}", "purpose": "디자인 상세/LLM 분석 상태 조회", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 183, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L183"}, {"endpoint": "PATCH /owner/designs/{design_id}", "purpose": "디자인 정보 수정", "params": "title, description, base_price, duration_minutes, available_designer_ids, owner_tags", "source_file": "spec_text/06_owner_design.md", "line": 188, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L188"}, {"endpoint": "POST /owner/designs/{design_id}/images", "purpose": "디자인 이미지 추가. 디자인당 이미지 최대 5장 제한을 초과하면 VALIDATION_ERROR. 호출 시 백엔드가 design.ai_analysis_status를 pending으로 자동 되돌리고 LLM 큐에 재투입 (이미지 변경 자동 재분석 트리거)", "params": "image_urls(max total 5)", "source_file": "spec_text/06_owner_design.md", "line": 193, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L193"}, {"endpoint": "DELETE /owner/designs/{design_id}/images/{image_id}", "purpose": "디자인 이미지 삭제. 삭제 후 최소 1장 이상 남아야 함. 호출 시 design.ai_analysis_status를 pending으로 자동 되돌리고 LLM 큐에 재투입 (이미지 변경 자동 재분석 트리거)", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 198, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L198"}, {"endpoint": "POST /owner/designs/{design_id}/reanalyze", "purpose": "LLM 재분석 요청. ai_analysis_status=failed이거나 사장님이 수동으로 다시 돌리고 싶을 때. pending으로 되돌리고 큐에 재투입", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 203, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L203"}, {"endpoint": "PATCH /owner/designs/{design_id}/visibility", "purpose": "노출/숨김 변경", "params": "visibility", "source_file": "spec_text/06_owner_design.md", "line": 208, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L208"}, {"endpoint": "DELETE /owner/designs/{design_id}", "purpose": "디자인 삭제 또는 숨김 처리", "params": "-", "source_file": "spec_text/06_owner_design.md", "line": 198, "group": "owner_design", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/06_owner_design.md#L198"}], "missing_front_sections": [], "missing_refs": [], "coverage": 1.0, "status": "connected"}, {"id": "5", "title": "예약 관리", "front_sections": ["5", "5-1", "5-2", "5-3", "5-4", "5-5", "5-6", "5-7", "5-8", "5-9"], "summary": "월간 캘린더, 예약 상세, 수락/거절/취소/완료/노쇼, 입금 확인 요청 뱃지.", "backend_files": ["spec_text/07_owner_reservation.md", "spec_text/04_user_discovery_reservation.md"], "entities": {"Reservation": ["reservation_id", "user_id", "shop_id", "design_id", "designer_id", "start_datetime", "end_datetime", "duration_minutes", "status", "total_price", "reservation_policy_snapshot", "payment_method_snapshot", "deposit_amount_snapshot", "bank_transfer_guide_snapshot", "user_payment_notified_at", "owner_payment_confirmed_at", "reminder_sent_at", "user_request_memo", "cancel_reason", "cancelled_at", "completed_at", "no_show_at"]}, "apis": {"owner_reservation": ["GET /owner/reservations", "GET /owner/reservations/export", "GET /owner/reservations/{id}", "POST /owner/reservations/{id}/accept", "POST /owner/reservations/{id}/reject", "POST /owner/reservations/{id}/cancel", "POST /owner/reservations/{id}/payment-confirmed", "POST /owner/reservations/{id}/complete", "POST /owner/reservations/{id}/no-show", "GET /owner/designers/{id}/schedule"]}, "keywords": ["reservation", "calendar", "payment-confirmed", "no-show"], "checkpoints": ["CSV export는 API 후보가 있지만 MVP 1차 출시 제외로 표시되어야 함.", "입금 확인 요청 뱃지는 status/payment snapshot/입금 알림/사장님 확인 시각 4조건을 모두 봄."], "implementation_guides": ["단순 `pending`은 슬롯 hard-lock이 아니다. 사장님 웹은 미처리 pending을 `created_at` 오름차순으로 보여주고, 수락 시점에 충돌을 재검사한다.", "계좌이체 샵은 `pending -> payment_pending -> confirmed` 흐름이다. 유저의 [입금 완료]만으로 확정되지 않고 사장의 [입금 확인됨]이 필요하다.", "노쇼는 MVP에서 방어적으로 구현한다. `confirmed`이고 시술 시작 30분 이후일 때만 가능하며, 금전/패널티 자동 처리는 하지 않는다."], "front_refs": [{"id": "5", "level": 1, "title": "5. 예약 관리", "line": 220, "body": "", "excerpt": ""}, {"id": "5-1", "level": 2, "title": "5-1. 예약 캘린더", "line": 222, "body": "- **MVP 기본 뷰: 월간만** (일간/주간 뷰 전환은 post-MVP)\n\n- 디자이너별 필터링 가능\n\n- 예약 상태별 색상 구분 표시\n\n- 캘린더에서 예약 클릭 시 예약 상세로 이동\n\n- 미처리 pending 예약은 별도 목록으로 created_at 오름차순(먼저 예약 요청한 순서) 표시. 같은 슬롯에 여러 pending 요청이 있으면 사장님이 목록 순서대로 응답하도록 유도\n\n- 백엔드 GET /owner/reservations는 from/to 임의 범위 지원하므로 추후 일간/주간 추가 시 백엔드 변경 없음", "excerpt": "- **MVP 기본 뷰: 월간만** (일간/주간 뷰 전환은 post-MVP)\n- 디자이너별 필터링 가능\n- 예약 상태별 색상 구분 표시\n- 캘린더에서 예약 클릭 시 예약 상세로 이동\n- 미처리 pending 예약은 별도 목록으로 created_at 오름차순(먼저 예약 요청한 순서) 표시. 같은 슬롯에 여러 pending 요청이 있으면 사장님이 목록 순서대로 응답하도록 유도\n- 백엔드 GET /owner/reservations는 from/to 임의 범위 지원하므로 추후 일간/주간 추가 시 백엔드 변경 없음"}, {"id": "5-2", "level": 2, "title": "5-2. 예약 상태 정의", "line": 236, "body": "| **상태값** | **설명** | **유저 앱 표시** | **사장님 웹 표시** |\n| --- | --- | --- | --- |\n| pending | 수락 대기 | 승인 대기 중 | 신규 예약 |\n| payment_pending | 입금 확인 대기 | 입금 확인 대기 | 입금 확인 대기 |\n| confirmed | 확정 | 예약 완료 | 확정 예약 |\n| rejected | 거절됨 | 거절됨 | 거절 예약 |\n| cancelled_by_user | 유저 취소 | 취소됨 | 유저 취소 |\n| cancelled_by_shop | 샵 취소 | 샵 사정으로 취소됨 | 샵 취소 |\n| no_show | 노쇼 | 노쇼 처리됨 | 노쇼 |\n| completed | 완료 | 리뷰 작성 유도 | 완료 |", "excerpt": "| **상태값** | **설명** | **유저 앱 표시** | **사장님 웹 표시** |\n| --- | --- | --- | --- |\n| pending | 수락 대기 | 승인 대기 중 | 신규 예약 |\n| payment_pending | 입금 확인 대기 | 입금 확인 대기 | 입금 확인 대기 |\n| confirmed | 확정 | 예약 완료 | 확정 예약 |\n| rejected | 거절됨 | 거절됨 | 거절 예약 |\n| cancelled_by_user | 유저 취소 | 취소됨 | 유저 취소 |\n| cancelled_by_shop | 샵 취소 | 샵 사정으로 취소됨 | 샵 취소 |\n| no_show | 노쇼 | 노쇼 처리됨 | 노쇼 |\n| completed | 완료 | 리뷰 작성 유도 | 완료 |"}, {"id": "5-3", "level": 2, "title": "5-3. 예약 상세 확인", "line": 249, "body": "- 표시 항목: 유저 정보, 디자인, 예약 시간, 담당 디자이너, 유저 요청사항, 예약 상태\n\n- 예약 운영 안내(취소 / 노쇼 정책) 스냅샷 확인 가능\n\n- **입금 확인 요청 뱃지 (계좌이체 샵 한정)**:\n  - 표시 조건: `status=payment_pending` AND `payment_method_snapshot=bank_transfer_guide` AND `user_payment_notified_at != null` AND `owner_payment_confirmed_at IS NULL`\n  - 즉 유저가 [입금 완료]를 눌렀고 사장님이 아직 처리 안 한 경우\n  - 캘린더에서도 해당 예약 칸에 시각 마커 표시 (색상 또는 작은 아이콘)\n  - 뱃지 클릭 시 모달 표시 — 두 가지 선택지\n    - **[입금 확인됨]** → `POST /owner/reservations/{id}/payment-confirmed` 호출 → `owner_payment_confirmed_at` 기록 → `confirmed` 전환 → 뱃지 사라짐\n    - **[샵 사정 취소]** (미입금 시) → 기존 `POST /owner/reservations/{id}/cancel` 호출 → cancelled_by_shop로 전환 → 뱃지 자연히 사라짐", "excerpt": "- 표시 항목: 유저 정보, 디자인, 예약 시간, 담당 디자이너, 유저 요청사항, 예약 상태\n- 예약 운영 안내(취소 / 노쇼 정책) 스냅샷 확인 가능\n- **입금 확인 요청 뱃지 (계좌이체 샵 한정)**:\n  - 표시 조건: `status=payment_pending` AND `payment_method_snapshot=bank_transfer_guide` AND `user_payment_notified_at != null` AND `owner_payment_confirmed_at IS NULL`\n  - 즉 유저가 [입금 완료]를 눌렀고 사장님이 아직 처리 안 한 경우\n  - 캘린더에서도 해당 예약 칸에 시각 마커 표시 (색상 또는 작은 아이콘)\n  - 뱃지 클릭 시 모달 표시 — 두 가지 선택지\n    - **[입금 확인됨]** → `POST /owner/reservations/{id}/payment-confirmed` 호출 → `owner_payment_confirmed_at` 기록 → `confirmed` 전환 → 뱃지 사라짐\n    - **[샵 사정 취소]** (미입금 시) → 기존 `POST /owner/reservations/{id}/cancel` 호출 → cancelled_by_shop로 전환 → 뱃지 자연히 사라짐"}, {"id": "5-4", "level": 2, "title": "5-4. 예약 수락 및 입금 안내", "line": 263, "body": "", "excerpt": ""}, {"id": "5-5", "level": 2, "title": "5-5. 예약 거절", "line": 295, "body": "- 거절 버튼 클릭 → 거절 사유 입력 (필수)\n\n- rejected 상태로 변경\n\n- 유저에게 거절 알림 + 사유 전달", "excerpt": "- 거절 버튼 클릭 → 거절 사유 입력 (필수)\n- rejected 상태로 변경\n- 유저에게 거절 알림 + 사유 전달"}, {"id": "5-6", "level": 2, "title": "5-6. 샵 사정 취소", "line": 303, "body": "- confirmed 예약을 사장님이 취소 가능\n\n- **취소 사유 입력 필수** (텍스트) — 거절(reject)과 동일하게 필수\n\n- cancelled_by_shop 상태로 변경\n\n- 유저에게 취소 알림 + 사유 전달", "excerpt": "- confirmed 예약을 사장님이 취소 가능\n- **취소 사유 입력 필수** (텍스트) — 거절(reject)과 동일하게 필수\n- cancelled_by_shop 상태로 변경\n- 유저에게 취소 알림 + 사유 전달"}, {"id": "5-7", "level": 2, "title": "5-7. 시술 완료 처리", "line": 313, "body": "- 사장님이 수동으로 completed 처리\n\n- completed 전환 시 유저 앱에 리뷰 작성 유도 APNs 알림 발송", "excerpt": "- 사장님이 수동으로 completed 처리\n- completed 전환 시 유저 앱에 리뷰 작성 유도 APNs 알림 발송"}, {"id": "5-8", "level": 2, "title": "5-8. 노쇼 처리", "line": 319, "body": "- 시술 시작 시간 기준 30분 이후부터 노쇼 처리 버튼 활성화\n\n- no_show 상태로 변경\n\n- 앱 내 금전 처리 없이 상태 기록만 남김\n\n- 유저 노쇼 이력 내부 기록", "excerpt": "- 시술 시작 시간 기준 30분 이후부터 노쇼 처리 버튼 활성화\n- no_show 상태로 변경\n- 앱 내 금전 처리 없이 상태 기록만 남김\n- 유저 노쇼 이력 내부 기록"}, {"id": "5-9", "level": 2, "title": "5-9. 예약 내역 다운로드", "line": 329, "body": "- **MVP 1차 출시 제외. post-MVP 우선순위 큐로 분류**\n\n- 사장님 실사용 피드백 받고 필요한 컬럼/기간/필터 구체화 후 추가 예정\n\n- 추가 시 GET /owner/reservations/export?from=&to=&status=&format=csv 형태. from/to 최대 90일 범위 제한", "excerpt": "- **MVP 1차 출시 제외. post-MVP 우선순위 큐로 분류**\n- 사장님 실사용 피드백 받고 필요한 컬럼/기간/필터 구체화 후 추가 예정\n- 추가 시 GET /owner/reservations/export?from=&to=&status=&format=csv 형태. from/to 최대 90일 범위 제한"}], "field_refs": [{"name": "reservation_id", "type": "UUID", "required": "자동", "note": "백엔드 생성", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 234, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L234"}, {"name": "user_id", "type": "UUID", "required": "필수", "note": "예약한 유저", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 240, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L240"}, {"name": "shop_id", "type": "UUID", "required": "필수", "note": "예약 대상 샵", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 246, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L246"}, {"name": "design_id", "type": "UUID", "required": "필수", "note": "예약 대상 디자인", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 252, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L252"}, {"name": "designer_id", "type": "UUID", "required": "필수", "note": "최종 배정 디자이너. 자동 배정이어도 저장", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 258, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L258"}, {"name": "start_datetime", "type": "timestamp", "required": "필수", "note": "UTC 저장, API는 ISO 8601", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 270, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L270"}, {"name": "end_datetime", "type": "timestamp", "required": "자동", "note": "start_datetime + duration_minutes", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 276, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L276"}, {"name": "duration_minutes", "type": "int", "required": "자동", "note": "예약 시점 디자인 소요시간 스냅샷", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 282, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L282"}, {"name": "status", "type": "enum", "required": "자동", "note": "pending/payment_pending/confirmed/rejected/cancelled_by_user/cancelled_by_shop/no_show/completed", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 288, "entity": "Reservation", "href": "https://github.com/poi82999/ ervation.md#L318"}, {"name": "user_payment_notified_at", "type": "timestamp", "required": "자동", "note": "payment_pending 상태에서 유저가 [입금 완료] 버튼을 누른 시각. null이면 미클릭. 한 번 채워지면 다시 누를 수 없음 (재클릭 차단용)", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 324, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L324"}, {"name": "owner_payment_confirmed_at", "type": "timestamp", "required": "자동", "note": "사장님이 통장에서 입금 확인 후 [입금 확인됨] 버튼을 누른 시각. payment_pending + user_payment_notified_at != null인 계좌이체 예약에서만 의미 있음. 채워지면 status=confirmed로 전환되고 뱃지 사라짐", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 330, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L330"}, {"name": "reminder_sent_at", "type": "timestamp", "required": "자동", "note": "사장님 응답 리마인드 알림 발송 시각. pending 상태가 1시간 이상 방치되면 스케줄러가 1회 발송하고 채움. null이면 미발송, 채워지면 재발송 차단", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 336, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L336"}, {"name": "user_request_memo", "type": "text", "required": "선택", "note": "유저 요청사항", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 348, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L348"}, {"name": "cancel_reason", "type": "text", "required": "선택", "note": "취소/거절 사유", "source_file": "spec_text/04_user_discovery_reservation.md", "line": 354, "entity": "Reservation", "href": "https://github.com/poi82999/snail_backend_specification/blob/main/spec_text/04_user_discovery_reservation.md#L354"}, {"name": "cancelled_at", "type": "timestamp", "required": "자동", "note": "취소 시각", "source_file": "spec_text/04_user_disco . 디자인 | owner_tags 정책 | 0~N개 자유 입력 (필수 X). 노출 조건은 승인된 사장님 + 공개 샵 + 공개 디자인 + ai_analysis_status=done |\n| 4. 디자인 | 재분석 버튼 | 제공 + 이미지 변경 시 자동 트리거 |\n| 4. 디자인 | 이미지 제한 | 디자인당 최대 5장. 백엔드 API에서 총량 검증 |\n| 4. 디자인 | 분석 상태 표시 단위 | 사장님 화면 3단계 (pending+in_progress='분석 중') |\n| 4. 디자인 | 확정 예약 있는 디자인 삭제 | visibility=hidden + soft delete 자동 처리 |\n| 5. 예약 | 계좌이체 확정 흐름 | 계좌이체 샵은 사장님 수락 후 payment_pending, 유저 [입금 완료] 후 사장님 [입금 확인됨] 처리 시 confirmed |\n| 5. 예약 | 미입금 처리 | 자동 만료 없음, 사장님 수동 취소 |\n| 5. 예약 | 입금 확인 요청 뱃지 | 사장님 [입금 확인됨] 버튼 또는 [샵 사정 취소]로 처리 시 사라짐 |\n| 5. 예약 | pending 목록 | 미처리 pending은 created_at 오름차순으로 목록 표시 |\n| 5. 예약 | 샵 사정 취소 사유 | 필수 (텍스트 입력) |\n| 5. 예약 | 캘린더 뷰 | MVP 월간만, 일간/주간은 post-MVP |\n| 5. 예약 | CSV export | MVP 제외 (post-MVP 큐로 분류) |\n| 6. 리뷰 | 답변 수정/삭제 | PATCH/DELETE /reviews/{id}/reply API 제공 |\n| 6. 리뷰 | 정렬 옵션 | 최신순(기본) / 별점 높은순 / 별점 낮은순 |\n| 6. 리뷰 | 사장님 리뷰 API | 단수 샵 정책 기준 GET /owner/reviews |\n| 7. 스네일 | 사장님 스네일 API | 단수 샵 정책 기준 GET /owner/snaps |\n| 8. 대시보드 | 집계 API | GET /owner/dashboard/summary 단일 API (4지표) |\n| 9. 알림 | 웹푸시 채택 | 제외 (카카오 알림톡 + 알림함 조합) |\n| 9. 알림 | 사장님 알림함 | 도입 (OwnerNotification 엔티티 영속화) |\n| 9. 알림 | 응답 리마인드 시간 | pending 1시간 경과 시 1회 발송 |\n| 9. 알림 | 카톡 발송 실패 처리 | 알림함은 적재 + 자동 재시도 3회(지수 backoff) |\n| 검색 | 검색 엔진 | Elasticsearch + nori, MVP부터 도입 |\n| 검색 | 필드 가중치 | title^5 / owner_tags^4 / ai_tags^3 / description^2 / shop.name^1.5 / shop.region^1.5 |\n| 검색 | 0건 폴백 | recommendations 별도 필드 + 프론트 분리 노출 |\n| 검색 | 위치 처리 | Shop.region 자동 파싱, 검색 q에 매칭 + 별도 필터 지원 |\n| 검색 | 자동완성/인기 태그 | MVP 제외 |\n| 공통 | 이미지 업로드 | presigned URL + 권한 1회 체크 + 10MB 제한 + 서버 워커 리사이즈 |", "excerpt": "| **섹션** | **항목** | **현재 상태** |\n| --- | --- | --- |\n| 4. 디자인 | LLM 분석 중 표시 UI 디테일 (진행바/뱃지 등 형태) | UI 협의 필요 |\n| 8. 대시보드 | 대시보드 표시 항목 세부 UI 구성 (그리드/카드 디자인) | UI 협의 필요 |\n| 9. 알림 | 사장님 응답 리마인드 시간값 재조정 가능성 (현재 1h) | 운영 데이터 후 |\n**v1 → v1.1 확정 사항 (누적)**\n| **섹션** | **항목** | **확정 내용** |\n| --- | --- | --- |\n| 1. 로그인 | 사업자 인증 게이트 | 백엔드 403 VERIFICATION_REQUIRED 코드 도입. UI 비활성화 + 서버 검증 이중 가드   <script>
    const data = JSON.parse(document.getElementById("index-data").textContent);

    const escapeHtml = (value) => String(value ?? "")

    const statusLabel = (item) => item.status === "connected" ? "연결됨" : "확인 필요";

    const sourceLink = (ref) => ref.href
      ? `<a href="${escapeHtml(ref.href)}">${escapeHtml(ref.source_file)}${ref.line ? ":" + ref.line : ""}</a>`
      : escapeHtml(ref.source_file || "");

    const easyFieldMap = {

      original_url: "사장님이 올린 원본 이미지 주소입니다.",
      cropped_url: "AI가 손톱 영역만 잘라 만든 이미지 주소입니다.",

      status: "예약이나 작업이 현재 어느 상태인지 나타냅니다. 화면 버튼 노출과 다음 동작이 이 값으로 갈립니다.",
      user_payment_notified_at: "고객이 [입금 완료]를 눌러 사장님에게 확인 요청을 보낸 시각입니다.",
      owner_payment_confirmed_at: "사장님이 실제 입금을 확인하고 승인한 시각입니다.",
      reservation_policy_snapshot: "예약 당시의 운영 정책을 복사해 둔 값입니다. 나중에 샵 설정이 바뀌어도 기존 예약 기준을 보존합니다.",

      deeplink_target: "알림을 클릭했을 때 이동할 화면 위치입니다.",
    };

    const easyApiMap = {
      "POST /owner/auth/register": "사장님 계정을 새로 만드는 가입 API입니다.",
      "GET /owner/me": "로그인한 사장님의 계정 상태와 사업자 인증 상태를 확인합니다.",
      "POST /owner/business-verification": "사업자등록증 등 인증 정보를 제출하거나 재제출합니다.",
      "POST /owner/shop": "사장님 샵 초안을 처음 만듭니다. 승인 전에도 저장은 가능하지만 공개는 막습니다.",
      "GET /owner/shop": "내 단수 샵 정보를 불러옵니다.",
      "PATCH /owner/shop": "샵 이름, 주소, 전화번호 같은 기본 정보를 수정합니다.",
      "PATCH /owner/shop/visibility": "샵을 고객에게 공개하거나 숨깁니다. 사업자 승인 후에만 공개할 수 있습니다.",
      "POST /owner/designs": "새 디자인을 등록합니다. 화면은 바로 저장되고 AI 분석은 뒤에서 진행됩니다.",
      "GET /owner/designs": "내 디자인 목록을 가져옵니다. 분석 중/실패/숨김 탭 구성에 사용합니다.",
      "PATCH /owner/designs/{design_id}": "디자인 제목, 가격, 소요 시간, 사장님 태그를 수정합니다.",
      "POST /owner/designs/{design_id}/images": "디자인 사진을 추가합니다. 총 5장 제한을 넘으면 실패합니다.",
      "POST /owner/designs/{design_id}/reanalyze": "AI 분석 실패 또는 재분석 버튼과 연결됩니다.",
      "PATCH /owner/designs/{design_id}/visibility": "디자인을 고객에게 공개하거나 숨깁니다.",
      "GET /owner/reservations": "사장님 예약 목록과 캘린더를 채우는 API입니다.",
      "POST /owner/reservations/{id}/accept": "사장님이 예약 요청을 수락합니다. 계좌이체면 바로 확정이 아니라 입금 대기 상태가 됩니다.",
      "POST /owner/reservations/{id}/payment-confirmed": "사장님이 실제 입금을 확인하고 예약을 확정합니다.",
      "POST /owner/reservations/{id}/reject": "사장님이 예약 요청을 거절합니다.",
      "POST /owner/reservations/{id}/complete": "시술 완료 처리 버튼과 연결됩니다.",
      "POST /owner/reservations/{id}/no-show": "고객이 오지 않았을 때 노쇼로 표시합니다. MVP에서는 방어적으로 제한합니다.",
      "GET /owner/reviews": "내 샵 리뷰 목록을 보여줍니다.",
      "GET /owner/snaps": "내 샵이 태그된 스네일 게시물을 보여줍니다.",
      "GET /owner/dashboard/summary": "대시보드 숫자 카드들을 한 번에 가져옵니다.",
      "GET /owner/notifications": "사장님 알림함 목록을 가져옵니다.",
    };

    function easyField(ref) {
      return easyFieldMap[ref.name] || ref.note || "-";
    }

    function easyApi(ref) {
      return easyApiMap[ref.endpoint] || ref.purpose || "-";
    }

    function renderStats() {
      document.getElementById("generatedMeta").textContent =
        `${data.source.frontend_spec} / ${data.source.backend_spec_dir} / ${data.generated_at}`;
      const rows = [
        ["기능", data.stats.mapping_sections],
        ["필드", data.stats.backend_fields],
        ["API", data.stats.apis],
        ["확인 필요", data.stats.attention_sections],
      ];
      document.getElementById("stats").innerHTML = rows
        .map(([label, value]) => `<div class="stat"><b>${value}</b>${label}</div>`)
        .join("");
    }

    function searchText(item) {
      return [
        item.id,
        item.title,
        item.summary,
        ...(item.keywords || []),
        ...(item.field_refs || []).map((ref) => `${ref.entity} ${ref.name} ${ref.note}`),
        ...(item.api_refs || []).map((ref) => `${ref.group} ${ref.endpoint} ${ref.purpose} ${ref.params}`),
      ].join(" ").toLowerCase();
    }

    function renderList() {
      const q = document.getElementById("filterInput").value.trim().toLowerCase();
      const status = document.getElementById("statusFilter").value;
      const items = data.mappings.filter((item) => {
        const okText = !q || searchText(item).includes(q);
        const okStatus = status === "all" || item.status === status;
        return okText && okStatus;
      });
      document.getElementById("sectionList").innerHTML = items.map((item) => `
        <button class="section-item ${item.id === currentId ? "active" : ""}" data-id="${escapeHtml(item.id)}">
          <div class="section-title">${escapeHtml(item.id)}. ${escapeHtml(item.title)}</div>
          <div class="section-summary">${escapeHtml(item.summary)}</div>
          <div class="chips">
            <span class="chip ${statusClass(item)}">${statusLabel(item)}</span>
            <span class="chip">필드 ${item.field_refs.length}</span>
            <span class="chip">API ${item.api_refs.length}</span>
          </div>
        </button>
      `).join("");
      document.querySelectorAll(".section-item").forEach((button) => {
        button.addEventListener("click", () => {
          currentId = button.dataset.id;
          renderList();
          renderDetail();
        });
      });
      if (!items.some((item) => item.id === currentId) && items[0]) {
        currentId = items[0].id;
        renderList();
        renderDetail();
      }
    }

    function renderDetail() {
      const item = data.mappings.find((entry) => entry.id === currentId) || data.mappings[0];
      if (!item) return;
      const implementationGuides = item.implementation_guides?.length
        ? `<ul>${item.implementation_guides.map((row) => `<li>${escapeHtml(row)}</li>`).join("")}</ul>`
        : "<div class='meta'>등록된 구현 가이드 없음</div>";
      const checkpoints = item.checkpoints?.length
        ? `<ul>${item.checkpoints.map((row) => `<li>${escapeHtml(row)}</li>`).join("")}</ul>`
        : "<div class='meta'>등록된 체크 포인트 없음</div>";
      const missing = [...(item.missing_front_sections || []), ...(item.missing_refs || [])];
      const missingPanel = missing.length
        ? `<div class="panel full"><h3>확인 필요</h3><ul>${missing.map((row) => `<li><code>${escapeHtml(row)}</code></li>`).join("")}</ul></div>`
        : "";
      const frontRows = item.front_refs.map((ref) => `
        <tr>
          <td><code>${escapeHtml(ref.id)}</code></td>
          <td>${escapeHtml(ref.title)}</td>
          <td>${escapeHtml(ref.line)}</td>
        </tr>
      `).join("");
      const fieldRows = item.field_refs.map((ref) => `
        <tr>
          <td><code>${escapeHtml(ref.entity)}.${escapeHtml(ref.name)}</code></td>
          <td>${escapeHtml(easyField(ref))}</td>
          <td>${escapeHtml(ref.note)}</td>
          <td>${sourceLink(ref)}</td>
        </tr>
      `).join("");
      const apiRows = item.api_refs.map((ref) => `
        <tr>
          <td><code>${escapeHtml(ref.endpoint)}</code><div class="meta">${escapeHtml(ref.group)}</div></td>
          <td>${escapeHtml(easyApi(ref))}</td>
          <td>${escapeHtml(ref.purpose)}</td>
          <td>${escapeHtml(ref.params)}</td>
          <td>${sourceLink(ref)}</td>
        </tr>
      `).join("");
      const excerpt = item.front_refs.map((ref) => `# ${ref.title}\n${ref.excerpt}`).join("\n\n");
      document.getElementById("detail").innerHTML = `
        <div class="detail-header">
          <div>
            <h2>${escapeHtml(item.id)}. ${escapeHtml(item.title)}</h2>
            <div class="summary">${escapeHtml(item.summary)}</div>
            <div class="chips">
              ${(item.keywords || []).map((word) => `<span class="chip">${escapeHtml(word)}</span>`).join("")}
            </div>
          </div>
          <span class="chip ${statusClass(item)}">${statusLabel(item)} · ${Math.round(item.coverage * 100)}%</span>
        </div>
        <div class="grid">
          <div class="panel full"><h3>구현 분석 가이드</h3>${implementationGuides}</div>
          <div class="panel"><h3>프론트 섹션</h3><table><thead><tr><th>ID</th><th>제목</th><th>라인</th></tr></thead><tbody>${frontRows || "<tr><td colspan='3'>연결된 섹션 없음</td></tr>"}</tbody></table></div>
          <div class="panel"><h3>체크 포인트</h3>${checkpoints}</div>
          ${missingPanel}
          <div class="panel full"><h3>관련 필드</h3><table><thead><tr><th>필드</th><th>쉽게 말하면</th><th>원문 메모</th><th>출처</th></tr></thead><tbody>${fieldRows || "<tr><td colspan='4'>관련 필드 없음</td></tr>"}</tbody></table></div>
          <div class="panel full"><h3>관련 API</h3><table><thead><tr><th>엔드포인트</th><th>쉽게 말하면</th><th>원문 용도</th><th>요청값</th><th>출처</th></tr></thead><tbody>${apiRows || "<tr><td colspan='5'>관련 API 없음</td></tr>"}</tbody></table></div>
          <div class="panel full"><h3>프론트 명세 발췌</h3><div class="excerpt">${escapeHtml(excerpt || "발췌 없음")}</div></div>
        </div>
      `;
    }

    function renderGlobalResults() {
      const q = document.getElementById("globalSearch").value.trim().toLowerCase();
      const target = [...data.backend.fields, ...data.backend.apis];
      const rows = target.filter((item) => {
        if (!q) return false;
        const text = [
          item.entity,
          item.name,
          item.type,
          item.note,
          item.group,
          item.endpoint,
          item.purpose,
          item.params,
          item.source_file,
        ].join(" ").toLowerCase();
        return text.includes(q);
      }).slice(0, 80);
      document.getElementById("globalResults").innerHTML = rows.length
        ? rows.map((item) => {
          const label = item.endpoint
            ? `<code>${escapeHtml(item.endpoint)}</code><div class="meta">${escapeHtml(item.group)} · API</div>`
            : `<code>${escapeHtml(item.entity)}.${escapeHtml(item.name)}</code><div class="meta">${escapeHtml(item.type)} · ${escapeHtml(item.required)}</div>`;
          const body = item.endpoint ? item.purpose : item.note;
          const easy = item.endpoint ? easyApi(item) : easyField(item);
          return `<div class="result-row">${label}<div>${escapeHtml(easy || body)}</div><div class="meta">${escapeHtml(body)}</div><div class="meta">${sourceLink(item)}</div></div>`;
        }).join("")
        : `<div class="meta">검색어를 입력하면 필드/API가 표시됩니다.</div>`;
    }

    document.getElementById("filterInput").addEventListener("input", renderList);
    document.getElementById("statusFilter").addEventListener("change", renderList);
    document.getElementById("globalSearch").addEventListener("input", renderGlobalResults);
    renderStats();
    renderList();
    renderDetail();
    renderGlobalResults();
  </script>
</body>
</html>
